    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;

        body {
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
            font-family: 'Courier New', monospace;
            position: fixed;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 8px;
            z-index: 5;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;

            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);

            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;

            border: 1px solid rgba(255, 255, 255, 0.3);

        #health-bar-container {
            width: 160px;
            height: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ff4444;
            border-radius: 8px;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
        }

        #health-label {
            color: #fff;
            font-size: 9px;
            text-align: center;
            margin-top: 1px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
        }

        #crosshair svg {
            width: 80px;
            height: 80px;
        }

        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;

        #game-over-screen h1 {
            color: #ff4444;
            font-size: 38px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
        }

        #game-over-screen .final-score {
            color: #fff;
            font-size: 24px;
            margin: 10px 0;
        }

        #game-over-screen .ranking {
            color: #ffcc00;
            font-size: 14px;
            margin: 15px 0;
            text-align: center;
            max-height: 180px;
            overflow-y: auto;
            width: 90%;
        }

        #game-over-screen button {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;
        }

        #game-over-screen button:active {
            background: #cc0000;
            transform: scale(0.95);
        }

        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 20;
        }

        #splash-screen h1 {
            color: #ffcc00;
            font-size: 32px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px #ff8800;
            text-align: center;
        }

        #splash-screen .subtitle {
            color: #ccc;
            font-size: 13px;
            margin-bottom: 25px;
            text-align: center;
        }

        #splash-screen .instructions {
            color: #aaa;
            font-size: 12px;
            text-align: center;
            margin-bottom: 18px;
            line-height: 1.6;
        }

        #splash-screen button {
            background: #ff8800;
            color: #000;
            border: none;
            padding: 16px 45px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;

        #splash-screen button:active {
            background: #ffaa00;
            transform: scale(0.95);

        #permission-request {
            position: absolute;

            left: 50%;
            transform: translateX(-50%);

            color: #000;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 13px;
            pointer-events: all;
            z-index: 25;
            display: none;
            cursor: pointer;

        #gyro-debug {
            position: absolute;

            color: rgba(255, 255, 255, 0.5);

            pointer-events: none;
            z-index: 3;
            display: none;
        }

    <script type="importmap">

    <script type="module">
        import * as THREE from 'three';

        // ==================== SISTEMA DE AUDIO ====================
        class AudioSystem {
            constructor() {
                this.ctx = null;
                this.initialized = false;
                this.masterGain = null;
            }

            init() {
                if (this.initialized) return;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.45;
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                } catch (e) {
                    console.warn('Audio no disponible:', e);
                }
            }

            playGunshot() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                // Disparo más grave y potente (.50 cal)
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(25, now + 0.12);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.exponentialRampToValueAtTime(80, now + 0.12);

                gain.gain.setValueAtTime(0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 0.18);

                // Ruido
                const bufferSize = this.ctx.sampleRate * 0.08;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.25));
                }
                const noise = this.ctx.createBufferSource();
                const noiseGain = this.ctx.createGain();
                noise.buffer = buffer;
                noiseGain.gain.setValueAtTime(0.5, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                noise.connect(noiseGain);
                noiseGain.connect(this.masterGain);
                noise.start(now);
            }

            playExplosion() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(8, now + 1.0);

                gain.gain.setValueAtTime(0.9, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 1.2);

                const bufferSize = this.ctx.sampleRate * 0.7;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.18));
                }
                const noise = this.ctx.createBufferSource();
                const noiseGain = this.ctx.createGain();
                noise.buffer = buffer;
                noiseGain.gain.setValueAtTime(0.7, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                noise.connect(noiseGain);
                noiseGain.connect(this.masterGain);
                noise.start(now);
            }

            playHit() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.35);

                gain.gain.setValueAtTime(0.45, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 0.45);
            }

            playAlarm() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    const t = now + i * 0.4;
                    osc.frequency.setValueAtTime(550, t);
                    osc.frequency.setValueAtTime(750, t + 0.2);
                    gain.gain.setValueAtTime(0.25, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t);
                    osc.stop(t + 0.4);
                }
            }
        }

        // ==================== SISTEMA DE VIBRACIÓN ====================
        class VibrationSystem {
            constructor() {
                this.enabled = false;
            }

            requestPermission() {
                if (navigator.vibrate) {
                    navigator.vibrate(40);
                    this.enabled = true;
                }
            }

            vibrate(pattern) {
                if (this.enabled && navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            }

            gunshotVibrate() {
                this.vibrate([20, 15, 20]);
            }

            explosionVibrate() {
                this.vibrate([80, 40, 80, 40, 150]);
            }

            hitVibrate() {
                this.vibrate([150, 80, 150]);
            }
        }

        // ==================== JUEGO PRINCIPAL ====================
        class MidwayGame {
            constructor() {
                this.audio = new AudioSystem();
                this.vibration = new VibrationSystem();

                this.score = 0;
                this.health = 100;
                this.gameRunning = false;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.0;

                // Giroscopio CORREGIDO
                this.gyroYaw = 0; // Giro torreta - eje GAMMA (roll, inclinación lateral)
                this.gyroPitch = 0; // Elevación cañones - eje BETA (cabeceo)
                this.gyroAvailable = false;
                this.calibrated = false;
                this.calibrationGamma = 0;
                this.calibrationBeta = 45;

                // Torreta
                this.turretYaw = 0; // Ángulo actual de la torreta (radianes, 0 = mirando al frente)
                this.turretPitch = 0; // Elevación actual de los cañones
                this.targetYaw = 0;
                this.targetPitch = 0;

                // Disparo
                this.isFiring = false;
                this.fireCooldown = 0;
                this.fireRate = 0.1;
                this.bullets = [];
                this.muzzleFlash = 0;

                // Aviones
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];

                // Three.js
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.turretGroup = null;
                this.gunsGroup = null;
                this.barrelGroup = null;
                this.ocean = null;
                this.ship = null;
                this.bulletMeshes = [];
                this.planeMeshes = [];
                this.explosionParticles = [];

                // DOM
                this.scoreElement = document.getElementById('score');
                this.healthBar = document.getElementById('health-bar');
                this.messageElement = document.getElementById('message');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.splashScreen = document.getElementById('splash-screen');
                this.permissionRequest = document.getElementById('permission-request');
                this.finalScoreElement = document.getElementById('final-score');
                this.rankingElement = document.getElementById('ranking');
                this.gyroDebug = document.getElementById('gyro-debug');
            }

            init() {
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.1;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x5a8ab5);
                this.scene.fog = new THREE.FogExp2(0x7aafd4, 0.00012);

                // Cámara en primera persona desde la torreta
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.3, 400);
                this.camera.position.set(0, 2.8, 3.5);

                // Luces
                const ambientLight = new THREE.AmbientLight(0x7799bb, 0.7);
                this.scene.add(ambientLight);

                const sunLight = new THREE.DirectionalLight(0xffeedd, 3.5);
                sunLight.position.set(60, 50, 30);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 2048;
                sunLight.shadow.mapSize.height = 2048;
                sunLight.shadow.camera.near = 0.5;
                sunLight.shadow.camera.far = 250;
                sunLight.shadow.camera.left = -100;
                sunLight.shadow.camera.right = 100;
                sunLight.shadow.camera.top = 100;
                sunLight.shadow.camera.bottom = -100;
                this.scene.add(sunLight);

                const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x334466, 0.5);
                this.scene.add(hemiLight);

                this.createOcean();
                this.createShip();
                this.createTurret();
                this.setupEventListeners();
                this.setupGyroscope();

                this.lastTime = performance.now();
                this.animate();
            }

            createOcean() {
                const oceanGeometry = new THREE.PlaneGeometry(400, 400, 120, 120);
                const oceanMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a3a5c,
                    roughness: 0.25,
                    metalness: 0.7,
                    flatShading: false,
                });
                this.ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
                this.ocean.rotation.x = -Math.PI / 2;
                this.ocean.position.y = -2;
                this.ocean.receiveShadow = true;
                this.scene.add(this.ocean);
                this.oceanVertices = oceanGeometry.attributes.position.array.slice();
            }

            createShip() {
                this.ship = new THREE.Group();

                // Cubierta de vuelo
                const deckGeom = new THREE.BoxGeometry(28, 1.2, 65);
                const deckMat = new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.6, metalness: 0.35 });
                const deck = new THREE.Mesh(deckGeom, deckMat);
                deck.position.y = 1.2;
                deck.castShadow = true;
                deck.receiveShadow = true;
                this.ship.add(deck);

                // Líneas de cubierta
                for (let z = -30; z <= 30; z += 8) {
                    const lineGeom = new THREE.BoxGeometry(26, 0.05, 0.3);
                    const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 });
                    const line = new THREE.Mesh(lineGeom, lineMat);
                    line.position.set(0, 1.85, z);
                    this.ship.add(line);
                }

                // Isla
                const islandGeom = new THREE.BoxGeometry(5, 5.5, 11);
                const islandMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.55, metalness: 0.45 });
                const island = new THREE.Mesh(islandGeom, islandMat);
                island.position.set(9, 4.3, -4);
                island.castShadow = true;
                island.receiveShadow = true;
                this.ship.add(island);

                // Torre
                const towerGeom = new THREE.BoxGeometry(3.5, 3.5, 4.5);
                const towerMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.45, metalness: 0.55 });
                const tower = new THREE.Mesh(towerGeom, towerMat);
                tower.position.set(9, 7.8, -4);
                tower.castShadow = true;
                this.ship.add(tower);

                // Chimenea
                const funnelGeom = new THREE.CylinderGeometry(1.3, 1.8, 7, 8);
                const funnelMat = new THREE.MeshStandardMaterial({ color: 0x383838, roughness: 0.45, metalness: 0.65 });
                const funnel = new THREE.Mesh(funnelGeom, funnelMat);
                funnel.position.set(5.5, 5.8, -7);
                funnel.castShadow = true;
                this.ship.add(funnel);

                // Casco
                const hullGeom = new THREE.BoxGeometry(23, 3.5, 60);
                const hullMat = new THREE.MeshStandardMaterial({ color: 0x883333, roughness: 0.7, metalness: 0.25 });
                const hull = new THREE.Mesh(hullGeom, hullMat);
                hull.position.y = -1.2;
                this.ship.add(hull);

                this.ship.position.set(0, 0, 0);
                this.scene.add(this.ship);
            }

            createTurret() {
                // La torreta está frente al jugador
                this.turretGroup = new THREE.Group();
                this.turretGroup.position.set(0, 2.0, 3.8);

                // Base giratoria
                const baseGeom = new THREE.CylinderGeometry(0.9, 1.2, 1.2, 20);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.4, metalness: 0.75 });
                const base = new THREE.Mesh(baseGeom, baseMat);
                base.position.y = 0;
                base.castShadow = true;
                this.turretGroup.add(base);

                // Escudo blindado frontal
                const shieldGeom = new THREE.BoxGeometry(2.8, 1.4, 1.8);
                const shieldMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.35, metalness: 0.8 });
                const shield = new THREE.Mesh(shieldGeom, shieldMat);
                shield.position.set(0, 0.7, -1);
                shield.castShadow = true;
                this.turretGroup.add(shield);

                // Asiento del artillero (referencia visual)
                const seatGeom = new THREE.BoxGeometry(1.2, 0.4, 1);
                const seatMat = new THREE.MeshStandardMaterial({ color: 0x664422, roughness: 0.7 });
                const seat = new THREE.Mesh(seatGeom, seatMat);
                seat.position.set(0, -0.2, 1.2);
                this.turretGroup.add(seat);

                // Respaldo
                const backGeom = new THREE.BoxGeometry(1.2, 1.5, 0.2);
                const back = new THREE.Mesh(backGeom, seatMat);
                back.position.set(0, 0.6, 1.6);
                this.turretGroup.add(back);

                // Grupo de cañones (se eleva)
                this.gunsGroup = new THREE.Group();
                this.gunsGroup.position.set(0, 0.9, -0.8);

                // Soporte de cañones
                const mountGeom = new THREE.BoxGeometry(1.6, 0.5, 0.8);
                const mount = new THREE.Mesh(mountGeom, new THREE.MeshStandardMaterial({
                    color: 0x555555,
                    roughness: 0.4,
                    metalness: 0.7
                }));
                this.gunsGroup.add(mount);

                // Cañones (apuntando hacia adelante = -Z)
                this.barrelGroup = new THREE.Group();
                for (let i = 0; i < 2; i++) {
                    const barrelGeom = new THREE.CylinderGeometry(0.12, 0.18, 3.5, 8);
                    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.25, metalness: 0.9 });
                    const barrel = new THREE.Mesh(barrelGeom, barrelMat);
                    barrel.rotation.x = Math.PI / 2;
                    barrel.position.set((i - 0.5) * 0.6, 0, -1.8);
                    barrel.castShadow = true;
                    this.barrelGroup.add(barrel);

                    // Bocacha
                    const muzzleGeom = new THREE.CylinderGeometry(0.2, 0.16, 0.4, 8);
                    const muzzle = new THREE.Mesh(muzzleGeom, new THREE.MeshStandardMaterial({
                        color: 0x1a1a1a,
                        roughness: 0.2,
                        metalness: 1.0
                    }));
                    muzzle.rotation.x = Math.PI / 2;
                    muzzle.position.set((i - 0.5) * 0.6, 0, -3.55);
                    this.barrelGroup.add(muzzle);
                }
                this.gunsGroup.add(this.barrelGroup);
                this.turretGroup.add(this.gunsGroup);
                this.scene.add(this.turretGroup);
            }

            setupEventListeners() {
                document.addEventListener('pointerdown', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen') || e.target
                        .closest('#permission-request')) return;
                    e.preventDefault();
                    this.isFiring = true;
                    this.audio.init();
                });

                document.addEventListener('pointerup', () => { this.isFiring = false; });
                document.addEventListener('pointerleave', () => { this.isFiring = false; });

                document.addEventListener('touchmove', (e) => {
                    if (this.gameRunning) e.preventDefault();
                }, { passive: false });

                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('gesturechange', (e) => e.preventDefault());
                document.addEventListener('gestureend', (e) => e.preventDefault());

                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                document.getElementById('permission-request').addEventListener('click', () => {
                    this.vibration.requestPermission();
                    document.getElementById('permission-request').style.display = 'none';
                });

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupGyroscope() {
                if (typeof DeviceOrientationEvent !== 'undefined') {
                    window.addEventListener('deviceorientation', (event) => {
                        // gamma: inclinación lateral (-90 a 90) → giro torreta
                        // beta: cabeceo (-180 a 180) → elevación cañones
                        const gamma = event.gamma || 0; // -90 a 90
                        const beta = event.beta || 45; // -180 a 180

                        if (!this.calibrated && this.gameRunning) {
                            this.calibrationGamma = gamma;
                            this.calibrationBeta = beta;
                            this.calibrated = true;
                        }

                        if (this.calibrated) {
                            // Gamma: diferencia respecto a calibración → giro torreta
                            let deltaGamma = gamma - this.calibrationGamma;
                            // Normalizar a -180..180
                            if (deltaGamma > 180) deltaGamma -= 360;
                            if (deltaGamma < -180) deltaGamma += 360;
                            // Mapear: inclinar izq abajo (gamma positivo si móvil horizontal) = girar izquierda
                            // Queremos que bajar lado izquierdo (gamma negativo en landscape?) gire a izquierda
                            // En landscape con la parte superior apuntando a la derecha:
                            //   gamma positivo = lado derecho más bajo → girar derecha
                            //   gamma negativo = lado izquierdo más bajo → girar izquierda
                            this.gyroYaw = deltaGamma * 0.035; // sensibilidad para giro 360°

                            // Beta: cabeceo → elevación cañones
                            // beta = 90 cuando está vertical (parte superior arriba)
                            // beta < 45 = inclinado hacia ti (inferior más cerca) → bajar cañones
                            // beta > 45 = inclinado hacia afuera (superior más cerca) → subir cañones
                            const pitchDelta = beta - this.calibrationBeta;
                            this.gyroPitch = -pitchDelta * 0.025; // negativo = bajar al inclinar hacia ti

                            // Limitar elevación
                            this.gyroPitch = THREE.MathUtils.clamp(this.gyroPitch, -0.7, 0.4);
                        }

                        this.gyroAvailable = true;

                        // Debug
                        if (this.gameRunning) {
                            this.gyroDebug.textContent =
                                `γ:${gamma.toFixed(1)}° β:${beta.toFixed(1)}° | Yaw:${this.gyroYaw.toFixed(2)} Pitch:${this.gyroPitch.toFixed(2)}`;
                        }
                    });

                    // iOS 13+
                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        this._iosGyro = true;
                        document.getElementById('splash-screen').querySelector('.instructions').innerHTML +=
                            '<br><br>📱 <b>iOS:</b> Permite el sensor al iniciar';
                    }
                }

                // Fallback táctil
                this.setupTouchFallback();
            }

            setupTouchFallback() {
                let touchActive = false;
                let touchStartX = 0;
                let touchStartY = 0;
                let fallbackYaw = 0;
                let fallbackPitch = 0;

                document.addEventListener('touchstart', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen')) return;
                    if (e.touches.length === 2) {
                        touchActive = true;
                        touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    }
                });

                document.addEventListener('touchmove', (e) => {
                    if (!touchActive || !this.gameRunning) return;
                    if (e.touches.length === 2) {
                        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        fallbackYaw += (cx - touchStartX) * 0.005;
                        fallbackPitch -= (cy - touchStartY) * 0.004;
                        fallbackPitch = THREE.MathUtils.clamp(fallbackPitch, -0.7, 0.4);
                        touchStartX = cx;
                        touchStartY = cy;
                    }
                });

                document.addEventListener('touchend', () => {
                    touchActive = false;
                });

                // Usar fallback si no hay giroscopio
                this._fallbackYaw = () => fallbackYaw;
                this._fallbackPitch = () => fallbackPitch;
            }

            async requestGyroPermission() {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            this.gyroAvailable = true;
                        }
                    } catch (e) {
                        console.warn('Permiso de giroscopio denegado:', e);
                    }
                }
            }

            startGame() {
                this.splashScreen.style.display = 'none';
                this.audio.init();

                if (this._iosGyro && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    this.requestGyroPermission().then(() => this.beginGameplay());
                } else {
                    this.beginGameplay();
                }

                if (!this.vibration.enabled && navigator.vibrate) {
                    document.getElementById('permission-request').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('permission-request').style.display = 'none';
                    }, 4000);
                }

                // Mostrar debug
                this.gyroDebug.style.display = 'block';
            }

            beginGameplay() {
                this.score = 0;
                this.health = 100;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.5;
                this.bullets = [];
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];
                this.bulletMeshes.forEach(m => this.scene.remove(m));
                this.bulletMeshes = [];
                this.planeMeshes.forEach(p => this.scene.remove(p.group));
                this.planeMeshes = [];
                this.explosionParticles.forEach(ep => ep.particles.forEach(p => this.scene.remove(p)));
                this.explosionParticles = [];
                this.isFiring = false;
                this.fireCooldown = 0;
                this.muzzleFlash = 0;
                this.turretYaw = 0;
                this.turretPitch = 0;
                this.calibrated = false;
                this.gameRunning = true;
                this.gameOverScreen.style.display = 'none';
                this.updateHUD();
                this.showMessage('¡DEFIENDE EL BUQUE!', 2000);
                this.audio.playAlarm();
                this.lastTime = performance.now();
            }

            restartGame() {
                this.beginGameplay();
            }

            gameOver() {
                this.gameRunning = false;
                this.isFiring = false;
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
                this.gameOverScreen.style.display = 'flex';
                this.finalScoreElement.textContent = `Puntuación: ${this.score}`;
                this.updateRanking();
                this.gyroDebug.style.display = 'none';
            }

            updateRanking() {
                let rankings = JSON.parse(localStorage.getItem('midway_rankings_v2') || '[]');
                rankings.push({
                    score: this.score,
                    time: Math.floor(this.gameTime),
                    date: new Date().toLocaleDateString(),
                });
                rankings.sort((a, b) => b.score - a.score);
                rankings = rankings.slice(0, 10);
                localStorage.setItem('midway_rankings_v2', JSON.stringify(rankings));

                let html = '<h3>🏆 MEJORES ARTILLEROS</h3>';
                rankings.forEach((r, i) => {
                    html += `<div>${i+1}. ${r.score} pts - ${r.time}s (${r.date})</div>`;
                });
                this.rankingElement.innerHTML = html;
            }

            showMessage(text, duration = 1500) {
                this.messageElement.textContent = text;
                this.messageElement.style.opacity = '1';
                clearTimeout(this._messageTimeout);
                this._messageTimeout = setTimeout(() => {
                    this.messageElement.style.opacity = '0';
                }, duration);
            }

            updateHUD() {
                this.scoreElement.textContent = `PTS: ${this.score}`;
                this.healthBar.style.width = `${this.health}%`;
                if (this.health < 30) {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff6600)';
                } else if (this.health < 60) {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff6600, #ffaa00)';
                } else {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
                }
            }

            spawnPlane() {
                const types = ['fighter', 'dive_bomber', 'torpedo_bomber'];
                const weights = [0.5, 0.3, 0.2];
                const rand = Math.random();
                let type = types[0];
                let cumulative = 0;
                for (let i = 0; i < types.length; i++) {
                    cumulative += weights[i];
                    if (rand <= cumulative) { type = types[i]; break; }
                }

                const angle = Math.random() * Math.PI * 2;
                const distance = 35 + Math.random() * 35;
                const height = 4 + Math.random() * 22;

                const plane = {
                    type,
                    position: new THREE.Vector3(Math.cos(angle) * distance, height, Math.sin(angle) * distance),
                    velocity: new THREE.Vector3(),
                    speed: 7 + Math.random() * 6 + this.difficulty * 2.5,
                    health: type === 'fighter' ? 2 : 3,
                    attackCooldown: 0,
                    alive: true,
                    group: null,
                };

                const dirToShip = new THREE.Vector3(0, 1.5, 0).sub(plane.position).normalize();
                plane.velocity.copy(dirToShip.multiplyScalar(plane.speed));

                plane.group = new THREE.Group();
                plane.group.position.copy(plane.position);

                // Fuselaje
                const fuseGeom = new THREE.ConeGeometry(0.35, 2.2, 6);
                const fuseMat = new THREE.MeshStandardMaterial({
                    color: type === 'fighter' ? 0x5a6a4a : type === 'dive_bomber' ? 0x6a4a3a : 0x4a5a3a,
                    roughness: 0.45,
                    metalness: 0.4
                });
                const fuse = new THREE.Mesh(fuseGeom, fuseMat);
                fuse.rotation.x = Math.PI / 2;
                fuse.position.z = -0.9;
                fuse.castShadow = true;
                plane.group.add(fuse);

                // Alas
                const wingGeom = new THREE.BoxGeometry(3.5, 0.08, 1);
                const wingMat = new THREE.MeshStandardMaterial({ color: 0x4a4a3a, roughness: 0.55, metalness: 0.3 });
                const wing = new THREE.Mesh(wingGeom, wingMat);
                wing.position.z = -0.7;
                wing.castShadow = true;
                plane.group.add(wing);

                // Cola
                const tailGeom = new THREE.BoxGeometry(1.3, 0.25, 0.4);
                const tail = new THREE.Mesh(tailGeom, wingMat);
                tail.position.set(0, 0.15, 0.4);
                plane.group.add(tail);

                // Hélice
                const propGeom = new THREE.BoxGeometry(0.08, 1.3, 0.08);
                const propMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.25, metalness: 0.8 });
                plane.propeller = new THREE.Mesh(propGeom, propMat);
                plane.propeller.position.z = -2;
                plane.group.add(plane.propeller);

                // Hinomaru
                const insigniaGeom = new THREE.CircleGeometry(0.25, 16);
                const insigniaMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide });
                const insignia = new THREE.Mesh(insigniaGeom, insigniaMat);
                insignia.position.set(0, 0, -0.4);
                insignia.rotation.y = Math.PI;
                plane.group.add(insignia);

                plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                this.scene.add(plane.group);
                this.planes.push(plane);
                this.planeMeshes.push(plane);
            }

            fireBullet() {
                if (this.fireCooldown > 0) return;
                const bulletSpeed = 55;

                // Dirección de disparo basada en la torreta
                const dir = new THREE.Vector3(0, 0, -1);
                dir.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));

                for (let i = 0; i < 2; i++) {
                    const offset = (i - 0.5) * 0.35;
                    const barrelPos = new THREE.Vector3(offset, 0, -3.5);
                    barrelPos.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                    barrelPos.add(this.gunsGroup.getWorldPosition(new THREE.Vector3()));

                    const spread = new THREE.Vector3((Math.random() - 0.5) * 0.04, (Math.random() - 0.5) * 0.04, (
                        Math.random() - 0.5) * 0.04);
                    const finalDir = dir.clone().add(spread).normalize();

                    const bullet = {
                        position: barrelPos.clone(),
                        velocity: finalDir.multiplyScalar(bulletSpeed),
                        life: 1.8,
                        tracer: null,
                    };

                    const tracerGeom = new THREE.SphereGeometry(0.07, 4, 4);
                    const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffff44 });
                    bullet.tracer = new THREE.Mesh(tracerGeom, tracerMat);
                    bullet.tracer.position.copy(bullet.position);
                    this.scene.add(bullet.tracer);
                    this.bulletMeshes.push(bullet.tracer);
                    this.bullets.push(bullet);
                }

                this.fireCooldown = this.fireRate;
                this.muzzleFlash = 0.05;
                this.audio.playGunshot();
                this.vibration.gunshotVibrate();
            }

            createExplosion(position, size = 1) {
                const particles = [];
                const particleCount = Math.floor(25 * size);

                for (let i = 0; i < particleCount; i++) {
                    const geom = new THREE.SphereGeometry(0.12 * size, 4, 4);
                    const mat = new THREE.MeshBasicMaterial({
                        color: new THREE.Color().setHSL(0.07 + Math.random() * 0.18, 1, 0.35 + Math.random() * 0.55),
                    });
                    const particle = new THREE.Mesh(geom, mat);
                    particle.position.copy(position);
                    particle.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 12 * size,
                        (Math.random() - 0.5) * 12 * size,
                        (Math.random() - 0.5) * 12 * size
                    );
                    particle.life = 0.5 + Math.random() * 0.7;
                    particle.age = 0;
                    this.scene.add(particle);
                    particles.push(particle);
                }

                const light = new THREE.PointLight(0xff5500, 4 * size, 12 * size);
                light.position.copy(position);
                this.scene.add(light);
                light.life = 0.25;
                light.age = 0;
                light.isLight = true;
                particles.push(light);

                this.explosionParticles.push({ particles, age: 0, life: 0.9 });
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
            }

            damageShip(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.health = 0;
                    this.updateHUD();
                    this.gameOver();
                    return;
                }
                this.audio.playHit();
                this.vibration.hitVibrate();
                this.showMessage('¡IMPACTO! -' + amount, 1000);
                this.updateHUD();
                this.hitEffects.push({ timer: 0.4, intensity: amount / 20 });
            }

            update(delta) {
                if (!this.gameRunning) {
                    this.updateOcean(delta);
                    this.updateExplosions(delta);
                    return;
                }

                this.gameTime += delta;
                this.fireCooldown = Math.max(0, this.fireCooldown - delta);
                this.muzzleFlash = Math.max(0, this.muzzleFlash - delta);

                // Dificultad
                this.difficulty = 1 + Math.floor(this.gameTime / 30);
                this.spawnInterval = Math.max(0.7, 3.5 - this.difficulty * 0.35);

                // Spawn
                this.spawnTimer += delta;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnPlane();
                    if (this.difficulty >= 3 && Math.random() < 0.5) {
                        setTimeout(() => { if (this.gameRunning) this.spawnPlane(); }, Math.random() * 800);
                    }
                }

                // Actualizar torreta desde giroscopio (o fallback)
                let inputYaw = this.gyroYaw;
                let inputPitch = this.gyroPitch;

                if (!this.gyroAvailable || !this.calibrated) {
                    if (this._fallbackYaw) inputYaw = this._fallbackYaw();
                    if (this._fallbackPitch) inputPitch = this._fallbackPitch();
                }

                this.targetYaw = inputYaw;
                this.targetPitch = inputPitch;

                // Suavizado
                this.turretYaw += (this.targetYaw - this.turretYaw) * Math.min(delta * 6, 1);
                this.turretPitch += (this.targetPitch - this.turretPitch) * Math.min(delta * 8, 1);
                this.turretPitch = THREE.MathUtils.clamp(this.turretPitch, -0.7, 0.4);

                // Aplicar rotación a la torreta
                this.turretGroup.rotation.y = this.turretYaw;
                this.gunsGroup.rotation.x = this.turretPitch;

                // Actualizar cámara (primera persona desde detrás de los cañones)
                const camOffset = new THREE.Vector3(0, 1.0, 0.5);
                camOffset.applyQuaternion(this.turretGroup.quaternion);
                const camPos = this.turretGroup.position.clone().add(camOffset);
                this.camera.position.copy(camPos);

                const lookDir = new THREE.Vector3(0, 0, -15);
                lookDir.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                const lookTarget = this.gunsGroup.getWorldPosition(new THREE.Vector3()).add(lookDir);
                this.camera.lookAt(lookTarget);

                // Disparo
                if (this.isFiring && this.fireCooldown <= 0) {
                    this.fireBullet();
                }

                // Muzzle flash
                if (this.muzzleFlash > 0) {
                    const fi = this.muzzleFlash / 0.05;
                    this.scene.fog = new THREE.FogExp2(
                        new THREE.Color().lerpColors(new THREE.Color(0x7aafd4), new THREE.Color(0xffcc66), fi),
                        0.00012 + fi * 0.0003
                    );
                } else {
                    this.scene.fog = new THREE.FogExp2(0x7aafd4, 0.00012);
                }

                // Balas
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    bullet.position.add(bullet.velocity.clone().multiplyScalar(delta));
                    bullet.life -= delta;
                    bullet.tracer.position.copy(bullet.position);

                    if (bullet.life <= 0 || bullet.position.y < -3 || Math.abs(bullet.position.x) > 70 || Math.abs(
                            bullet.position.z) > 70) {
                        this.scene.remove(bullet.tracer);
                        const idx = this.bulletMeshes.indexOf(bullet.tracer);
                        if (idx > -1) this.bulletMeshes.splice(idx, 1);
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    for (let j = this.planes.length - 1; j >= 0; j--) {
                        const plane = this.planes[j];
                        if (!plane.alive) continue;
                        if (bullet.position.distanceTo(plane.group.position) < 2.2) {
                            plane.health--;
                            if (plane.health <= 0) {
                                this.destroyPlane(j);
                                this.score += 100;
                                this.showMessage('¡DERRIBADO! +100', 1200);
                            } else {
                                this.showMessage('¡IMPACTO!', 500);
                                this.audio.playHit();
                            }
                            this.scene.remove(bullet.tracer);
                            const idx = this.bulletMeshes.indexOf(bullet.tracer);
                            if (idx > -1) this.bulletMeshes.splice(idx, 1);
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                // Aviones
                for (let i = this.planes.length - 1; i >= 0; i--) {
                    const plane = this.planes[i];
                    if (!plane.alive) continue;

                    plane.position.add(plane.velocity.clone().multiplyScalar(delta));
                    plane.group.position.copy(plane.position);
                    plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                    if (plane.propeller) plane.propeller.rotation.z += delta * 45;

                    plane.attackCooldown = Math.max(0, plane.attackCooldown - delta);
                    const distToShip = plane.position.length();

                    if (distToShip < 28 && plane.attackCooldown <= 0) {
                        if (plane.type === 'fighter') {
                            plane.attackCooldown = 1.8;
                            this.damageShip(2 + Math.floor(this.difficulty / 2));
                        } else if (plane.type === 'dive_bomber' && plane.position.y > 7 && distToShip < 18) {
                            plane.attackCooldown = 3.5;
                            plane.velocity.y = -18;
                            setTimeout(() => {
                                if (plane.alive && this.gameRunning) {
                                    this.damageShip(12 + this.difficulty * 2);
                                    this.createExplosion(new THREE.Vector3((Math.random() - 0.5) * 12,
                                        1.5, (Math.random() - 0.5) * 22), 0.7);
                                }
                            }, 700);
                        } else if (plane.type === 'torpedo_bomber' && plane.position.y < 2.5 && distToShip < 22) {
                            plane.attackCooldown = 5;
                            this.damageShip(18 + this.difficulty * 3);
                            this.createExplosion(new THREE.Vector3(0, -0.5, (Math.random() - 0.5) * 18), 1.1);
                            this.showMessage('¡TORPEDO! -' + (18 + this.difficulty * 3), 1500);
                        }
                    }

                    if (Math.abs(plane.position.x) > 65 || Math.abs(plane.position.z) > 65 || plane.position.y > 38 ||
                        plane.position.y < -6) {
                        this.removePlane(i);
                    }
                }

                if (Math.floor(this.gameTime) > Math.floor(this.gameTime - delta)) {
                    this.score += 10;
                }

                this.updateExplosions(delta);

                for (let i = this.hitEffects.length - 1; i >= 0; i--) {
                    this.hitEffects[i].timer -= delta;
                    if (this.hitEffects[i].timer <= 0) this.hitEffects.splice(i, 1);
                }

                this.updateOcean(delta);
                this.updateHUD();
            }

            destroyPlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.createExplosion(plane.group.position.clone(), 0.65);
                this.scene.remove(plane.group);
                const meshIdx = this.planeMeshes.indexOf(plane);
                if (meshIdx > -1) this.planeMeshes.splice(meshIdx, 1);
                this.planes.splice(index, 1);
            }

            removePlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.scene.remove(plane.group);
                const meshIdx = this.planeMeshes.indexOf(plane);
                if (meshIdx > -1) this.planeMeshes.splice(meshIdx, 1);
                this.planes.splice(index, 1);
            }

            updateExplosions(delta) {
                for (let i = this.explosionParticles.length - 1; i >= 0; i--) {
                    const explosion = this.explosionParticles[i];
                    explosion.age += delta;
                    for (let j = explosion.particles.length - 1; j >= 0; j--) {
                        const p = explosion.particles[j];
                        if (p.isLight) {
                            p.age += delta;
                            p.intensity = 4 * (1 - p.age / p.life);
                            if (p.age >= p.life) {
                                this.scene.remove(p);
                                explosion.particles.splice(j, 1);
                            }
                        } else {
                            p.age += delta;
                            p.position.add(p.velocity.clone().multiplyScalar(delta));
                            p.velocity.y += 1.5 * delta;
                            p.material.opacity = 1 - p.age / p.life;
                            p.material.transparent = true;
                            p.scale.setScalar(Math.max(0.08, 1 - p.age / p.life));
                            if (p.age >= p.life) {
                                this.scene.remove(p);
                                explosion.particles.splice(j, 1);
                            }
                        }
                    }
                    if (explosion.particles.length === 0) this.explosionParticles.splice(i, 1);
                }
            }

            updateOcean(delta) {
                if (!this.ocean || !this.oceanVertices) return;
                const positions = this.ocean.geometry.attributes.position.array;
                const time = performance.now() * 0.001;
                for (let i = 0; i < positions.length; i += 3) {
                    const x = this.oceanVertices[i];
                    const y = this.oceanVertices[i + 1];
                    positions[i + 2] = Math.sin(x * 0.25 + time) * Math.cos(y * 0.25 + time * 0.7) * 0.7 +
                        Math.sin(x * 0.12 + time * 1.2) * 0.35;
                }
                this.ocean.geometry.attributes.position.needsUpdate = true;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const now = performance.now();
                const delta = Math.min((now - this.lastTime) / 1000, 0.1);
                this.lastTime = now;
                this.update(delta);
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== INICIAR ====================
        const game = new MidwayGame();
        game.init();

        if ('serviceWorker' in navigator) {
            const swCode = `
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });
          `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
        }

        console.log('⚓ Batalla de Midway v2 - Artillero AA');
        console.log('📱 Móvil en HORIZONTAL | Gamma = giro torreta | Beta = elevación');
        console.log('⚖️ Inclina laterales para girar 360° | 📐 Cabecea para elevar cañones');
    </script>
