    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
            font-family: 'Courier New', monospace;
            position: fixed;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
        }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 8px;
            z-index: 5;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #score {
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #health-bar-container {
            width: 140px;
            height: 14px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #ff4444;
            border-radius: 7px;
            overflow: hidden;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
        }
        #health-label {
            color: #fff;
            font-size: 8px;
            text-align: center;
            margin-top: 1px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
        }
        #crosshair svg { width: 60px; height: 60px; }
        #message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.88);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
        }
        #game-over-screen h1 {
            color: #ff4444;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
        }
        #game-over-screen .final-score { color: #fff; font-size: 20px; margin: 8px 0; }
        #game-over-screen .ranking {
            color: #ffcc00;
            font-size: 12px;
            margin: 10px 0;
            text-align: center;
            max-height: 140px;
            overflow-y: auto;
            width: 90%;
        }
        #game-over-screen button {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;
        }
        #game-over-screen button:active { background: #cc0000; transform: scale(0.95); }

        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.93);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 20;
        }
        #splash-screen h1 {
            color: #ffcc00;
            font-size: 28px;
            margin-bottom: 6px;
            text-shadow: 0 0 30px #ff8800;
            text-align: center;
        }
        #splash-screen .subtitle { color: #ccc; font-size: 11px; margin-bottom: 20px; text-align: center; }
        #splash-screen .instructions { color: #aaa; font-size: 10px; text-align: center; margin-bottom: 14px; line-height: 1.5; }
        #splash-screen button {
            background: #ff8800;
            color: #000;
            border: none;
            padding: 14px 35px;
            font-size: 17px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;
        }
        #splash-screen button:active { background: #ffaa00; transform: scale(0.95); }
        #permission-request {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,136,0,0.9);
            color: #000;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: all;
            z-index: 25;
            display: none;
            cursor: pointer;
            font-weight: bold;
        }
        #gyro-debug {
            position: absolute;
            bottom: 6px;
            left: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 8px;
            pointer-events: none;
            z-index: 3;
            display: none;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }

<body>
    <div id="ui">
        <div id="hud">

            <div>
                <div id="health-bar-container"><div id="health-bar"></div></div>
                <div id="health-label">INTEGRIDAD DEL BUQUE</div>
            </div>
        </div>
    </div>
    <div id="crosshair">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-dasharray="5,3"/>
            <line x1="50" y1="10" x2="50" y2="30" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
            <line x1="50" y1="70" x2="50" y2="90" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
            <line x1="10" y1="50" x2="30" y2="50" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
            <line x1="70" y1="50" x2="90" y2="50" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>

            🤲 SOSTÉN el móvil con dos manos<br>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== AUDIO ====================
        class AudioSystem {
            constructor() { this.ctx = null;
                this.initialized = false;
                this.masterGain = null; }
            init() {
                if (this.initialized) return;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.4;
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                } catch (e) {}
            }
            playGunshot() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(25, now + 0.12);
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.exponentialRampToValueAtTime(80, now + 0.12);
                gain.gain.setValueAtTime(0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 0.18);
                const bufSize = this.ctx.sampleRate * 0.08;
                const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.25));
                const noise = this.ctx.createBufferSource();
                const nGain = this.ctx.createGain();
                noise.buffer = buf;
                nGain.gain.setValueAtTime(0.5, now);
                nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                noise.connect(nGain);
                nGain.connect(this.masterGain);
                noise.start(now);
            }
            playExplosion() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(8, now + 1.0);
                gain.gain.setValueAtTime(0.9, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 1.2);
                const bufSize = this.ctx.sampleRate * 0.7;
                const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.18));
                const noise = this.ctx.createBufferSource();
                const nGain = this.ctx.createGain();
                noise.buffer = buf;
                nGain.gain.setValueAtTime(0.7, now);
                nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                noise.connect(nGain);
                nGain.connect(this.masterGain);
                noise.start(now);
            }
            playHit() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.35);
                gain.gain.setValueAtTime(0.45, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 0.45);
            }
            playAlarm() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    const t = now + i * 0.4;
                    osc.frequency.setValueAtTime(550, t);
                    osc.frequency.setValueAtTime(750, t + 0.2);
                    gain.gain.setValueAtTime(0.25, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t);
                    osc.stop(t + 0.4);
                }
            }
        }

        // ==================== VIBRACIÓN ====================
        class VibrationSystem {
            constructor() { this.enabled = false; }
            requestPermission() { if (navigator.vibrate) { navigator.vibrate(40);
                    this.enabled = true; } }
            vibrate(p) { if (this.enabled && navigator.vibrate) navigator.vibrate(p); }
            gunshotVibrate() { this.vibrate([20, 15, 20]); }
            explosionVibrate() { this.vibrate([80, 40, 80, 40, 150]); }
            hitVibrate() { this.vibrate([150, 80, 150]); }
        }

        // ==================== JUEGO ====================
        class MidwayGame {
            constructor() {
                this.audio = new AudioSystem();
                this.vibration = new VibrationSystem();
                this.score = 0;
                this.health = 100;
                this.gameRunning = false;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.5;

                // Giroscopio - valores normalizados
                this.steerInput = 0; // Volante: negativo=izquierda, positivo=derecha
                this.pitchInput = 0; // Cabeceo: negativo=bajar, positivo=subir
                this.gyroAvailable = false;
                this.calibrated = false;
                this.calibSteer = 0;
                this.calibPitch = 0;

                // Torreta
                this.turretYaw = 0;
                this.turretPitch = 0;
                this.targetYaw = 0;
                this.targetPitch = 0;

                this.isFiring = false;
                this.fireCooldown = 0;
                this.fireRate = 0.1;
                this.bullets = [];
                this.muzzleFlash = 0;
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];

                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.turretGroup = null;
                this.gunsGroup = null;
                this.ocean = null;
                this.ship = null;
                this.bulletMeshes = [];
                this.planeMeshes = [];
                this.explosionParticles = [];

                this.scoreElement = document.getElementById('score');
                this.healthBar = document.getElementById('health-bar');
                this.messageElement = document.getElementById('message');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.splashScreen = document.getElementById('splash-screen');
                this.permissionRequest = document.getElementById('permission-request');
                this.finalScoreElement = document.getElementById('final-score');
                this.rankingElement = document.getElementById('ranking');
                this.gyroDebug = document.getElementById('gyro-debug');
            }

            init() {
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.1;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                // Cielo más claro para que se vea bien el horizonte
                this.scene.background = new THREE.Color(0x7eb8da);
                this.scene.fog = new THREE.FogExp2(0x8cc8e8, 0.00008);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.3, 400);
                this.camera.position.set(0, 2.8, 3.5);

                this.scene.add(new THREE.AmbientLight(0x8899bb, 0.8));
                const sun = new THREE.DirectionalLight(0xffeedd, 3.5);
                sun.position.set(60, 50, 30);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = 250;
                sun.shadow.camera.left = -100;
                sun.shadow.camera.right = 100;
                sun.shadow.camera.top = 100;
                sun.shadow.camera.bottom = -100;
                this.scene.add(sun);
                this.scene.add(new THREE.HemisphereLight(0x87ceeb, 0x334466, 0.5));

                this.createOcean();
                this.createShip();
                this.createTurret();
                this.setupEventListeners();
                this.setupGyroscope();

                this.lastTime = performance.now();
                this.animate();
            }

            createOcean() {
                const geo = new THREE.PlaneGeometry(500, 500, 150, 150);
                const mat = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.2, metalness: 0.75 });
                this.ocean = new THREE.Mesh(geo, mat);
                this.ocean.rotation.x = -Math.PI / 2;
                this.ocean.position.y = -2;
                this.ocean.receiveShadow = true;
                this.scene.add(this.ocean);
                this.oceanVertices = geo.attributes.position.array.slice();
            }

            createShip() {
                this.ship = new THREE.Group();

                // SOLO cubierta plana, sin isla ni torre ni chimenea
                const deck = new THREE.Mesh(
                    new THREE.BoxGeometry(30, 1.2, 70),
                    new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.6, metalness: 0.35 })
                );
                deck.position.y = 1.2;
                deck.castShadow = true;
                deck.receiveShadow = true;
                this.ship.add(deck);

                // Líneas de cubierta
                for (let z = -32; z <= 32; z += 8) {
                    const line = new THREE.Mesh(
                        new THREE.BoxGeometry(28, 0.05, 0.3),
                        new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 })
                    );
                    line.position.set(0, 1.85, z);
                    this.ship.add(line);
                }

                // Casco bajo el agua
                const hull = new THREE.Mesh(
                    new THREE.BoxGeometry(25, 3.5, 65),
                    new THREE.MeshStandardMaterial({ color: 0x883333, roughness: 0.7, metalness: 0.25 })
                );
                hull.position.y = -1.2;
                this.ship.add(hull);

                this.ship.position.set(0, 0, 0);
                this.scene.add(this.ship);
            }

            createTurret() {
                this.turretGroup = new THREE.Group();
                // Torreta en el centro de la cubierta, delante del jugador
                this.turretGroup.position.set(0, 1.9, 5);

                // Base giratoria baja
                const base = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.7, 0.9, 0.6, 20),
                    new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.4, metalness: 0.75 })
                );
                base.position.y = 0;
                base.castShadow = true;
                this.turretGroup.add(base);

                // Grupo de cañones (posición baja para que solo se vean puntas)
                this.gunsGroup = new THREE.Group();
                this.gunsGroup.position.set(0, 0.2, -0.5);

                // Soporte mínimo
                const mount = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 0.25, 0.5),
                    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.7 })
                );
                this.gunsGroup.add(mount);

                // Dos cañones largos apuntando hacia adelante
                for (let i = 0; i < 2; i++) {
                    const barrel = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.08, 0.13, 4.0, 8),
                        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.25, metalness: 0.9 })
                    );
                    barrel.rotation.x = Math.PI / 2;
                    barrel.position.set((i - 0.5) * 0.5, 0, -2);
                    barrel.castShadow = true;
                    this.gunsGroup.add(barrel);

                    // Bocacha (punta del cañón)
                    const muzzle = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.15, 0.12, 0.3, 8),
                        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 1.0 })
                    );
                    muzzle.rotation.x = Math.PI / 2;
                    muzzle.position.set((i - 0.5) * 0.5, 0, -4.0);
                    this.gunsGroup.add(muzzle);
                }

                this.turretGroup.add(this.gunsGroup);
                this.scene.add(this.turretGroup);
            }

            setupEventListeners() {
                document.addEventListener('pointerdown', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen') ||
                        e.target.closest('#permission-request')) return;
                    e.preventDefault();
                    this.isFiring = true;
                    this.audio.init();
                });
                document.addEventListener('pointerup', () => { this.isFiring = false; });
                document.addEventListener('pointerleave', () => { this.isFiring = false; });
                document.addEventListener('touchmove', (e) => { if (this.gameRunning) e.preventDefault(); }, { passive: false });
                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('gesturechange', (e) => e.preventDefault());
                document.addEventListener('gestureend', (e) => e.preventDefault());

                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                document.getElementById('permission-request').addEventListener('click', () => {
                    this.vibration.requestPermission();
                    document.getElementById('permission-request').style.display = 'none';
                });

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupGyroscope() {
                // ==========================================
                // GESTO DE VOLANTE (independiente de orientación):
                //   Mano derecha arriba + izquierda abajo = girar IZQUIERDA (steer negativo)
                //   Mano derecha abajo + izquierda arriba = girar DERECHA (steer positivo)
                //
                // GESTO DE CABECEO:
                //   Inclinar hacia ti (pantalla más cerca) = BAJAR cañones (pitch negativo)
                //   Inclinar hacia afuera (pantalla más lejos) = SUBIR cañones (pitch positivo)
                // ==========================================

                let smoothSteer = 0;
                let smoothPitch = 0;

                window.addEventListener('deviceorientation', (event) => {
                    const beta = event.beta || 45;
                    const gamma = event.gamma || 0;

                    const isLandscape = window.innerWidth > window.innerHeight;

                    let rawSteer, rawPitch;

                    if (isLandscape) {
                        // LANDSCAPE (apaisado):
                        // Volante: beta negativa = mano derecha arriba = izquierda
                        //          beta positiva = mano derecha abajo = derecha
                        rawSteer = -beta;
                        // Cabeceo: gamma positiva = inclinado hacia afuera = subir
                        //          gamma negativa = inclinado hacia ti = bajar
                        rawPitch = gamma;
                    } else {
                        // PORTRAIT (vertical):
                        // Volante: gamma positiva = mano derecha abajo = derecha
                        //          gamma negativa = mano derecha arriba = izquierda
                        rawSteer = gamma;
                        // Cabeceo: beta > 45 = inclinado hacia afuera = subir
                        //          beta < 45 = inclinado hacia ti = bajar
                        rawPitch = beta - 45;
                    }

                    // Suavizado
                    smoothSteer += (rawSteer - smoothSteer) * 0.35;
                    smoothPitch += (rawPitch - smoothPitch) * 0.35;

                    if (!this.calibrated && this.gameRunning) {
                        this.calibSteer = smoothSteer;
                        this.calibPitch = smoothPitch;
                        this.calibrated = true;
                    }

                    if (this.calibrated) {
                        let deltaSteer = smoothSteer - this.calibSteer;
                        let deltaPitch = smoothPitch - this.calibPitch;

                        // Zona muerta
                        if (Math.abs(deltaSteer) < 1.5) deltaSteer = 0;
                        if (Math.abs(deltaPitch) < 1.5) deltaPitch = 0;

                        // Mapeo: 45° de giro = recorrido completo
                        this.steerInput = THREE.MathUtils.clamp(deltaSteer / 40, -1.8, 1.8);
                        // Mapeo: 30° de cabeceo = rango completo
                        this.pitchInput = THREE.MathUtils.clamp(deltaPitch / 28, -0.7, 0.5);
                    }

                    this.gyroAvailable = true;

                    if (this.gameRunning) {
                        this.gyroDebug.textContent =
                            `${isLandscape?'LAND':'PORT'} | steer:${this.steerInput.toFixed(2)} pitch:${this.pitchInput.toFixed(2)} | raw β:${beta.toFixed(0)} γ:${gamma.toFixed(0)}`;
                    }
                });

                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    this._iosGyro = true;
                }
                this.setupTouchFallback();
            }

            setupTouchFallback() {
                let touchActive = false;
                let touchStartX = 0;
                let touchStartY = 0;
                let fbYaw = 0;
                let fbPitch = 0;

                document.addEventListener('touchstart', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen')) return;
                    if (e.touches.length === 2) {
                        touchActive = true;
                        touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    }
                });

                document.addEventListener('touchmove', (e) => {
                    if (!touchActive || !this.gameRunning) return;
                    if (e.touches.length === 2) {
                        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        fbYaw += (cx - touchStartX) * 0.005;
                        fbPitch += (cy - touchStartY) * 0.004;
                        fbPitch = THREE.MathUtils.clamp(fbPitch, -0.7, 0.5);
                        touchStartX = cx;
                        touchStartY = cy;
                    }
                });

                document.addEventListener('touchend', () => { touchActive = false; });
                this._fbYaw = () => fbYaw;
                this._fbPitch = () => fbPitch;
            }

            async requestGyroPermission() {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') this.gyroAvailable = true;
                    } catch (e) {}
                }
            }

            startGame() {
                this.splashScreen.style.display = 'none';
                this.audio.init();

                if (this._iosGyro && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    this.requestGyroPermission().then(() => this.beginGameplay());
                } else {
                    this.beginGameplay();
                }

                if (!this.vibration.enabled && navigator.vibrate) {
                    document.getElementById('permission-request').style.display = 'block';
                    setTimeout(() => { document.getElementById('permission-request').style.display = 'none'; }, 4000);
                }
                this.gyroDebug.style.display = 'block';
            }

            beginGameplay() {
                this.score = 0;
                this.health = 100;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.5;
                this.bullets = [];
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];
                this.bulletMeshes.forEach(m => this.scene.remove(m));
                this.bulletMeshes = [];
                this.planeMeshes.forEach(p => this.scene.remove(p.group));
                this.planeMeshes = [];
                this.explosionParticles.forEach(ep => ep.particles.forEach(p => this.scene.remove(p)));
                this.explosionParticles = [];
                this.isFiring = false;
                this.fireCooldown = 0;
                this.muzzleFlash = 0;
                this.turretYaw = 0;
                this.turretPitch = 0;
                this.calibrated = false;
                this.gameRunning = true;
                this.gameOverScreen.style.display = 'none';
                this.updateHUD();
                this.showMessage('¡DEFIENDE EL BUQUE!', 2000);
                this.audio.playAlarm();
                this.lastTime = performance.now();
            }

            restartGame() { this.beginGameplay(); }

            gameOver() {
                this.gameRunning = false;
                this.isFiring = false;
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
                this.gameOverScreen.style.display = 'flex';
                this.finalScoreElement.textContent = `Puntuación: ${this.score}`;
                this.updateRanking();
                this.gyroDebug.style.display = 'none';
            }

            updateRanking() {
                let rankings = JSON.parse(localStorage.getItem('midway_rankings_v4') || '[]');
                rankings.push({ score: this.score, time: Math.floor(this.gameTime), date: new Date().toLocaleDateString() });
                rankings.sort((a, b) => b.score - a.score);
                rankings = rankings.slice(0, 10);
                localStorage.setItem('midway_rankings_v4', JSON.stringify(rankings));
                let html = '<h3>🏆 MEJORES ARTILLEROS</h3>';
                rankings.forEach((r, i) => { html += `<div>${i+1}. ${r.score} pts - ${r.time}s (${r.date})</div>`; });
                this.rankingElement.innerHTML = html;
            }

            showMessage(text, duration = 1500) {
                this.messageElement.textContent = text;
                this.messageElement.style.opacity = '1';
                clearTimeout(this._msgTimeout);
                this._msgTimeout = setTimeout(() => { this.messageElement.style.opacity = '0'; }, duration);
            }

            updateHUD() {
                this.scoreElement.textContent = `PTS: ${this.score}`;
                this.healthBar.style.width = `${this.health}%`;
                this.healthBar.style.background =
                    this.health < 30 ? 'linear-gradient(90deg, #ff0000, #ff6600)' :
                    this.health < 60 ? 'linear-gradient(90deg, #ff6600, #ffaa00)' :
                    'linear-gradient(90deg, #ff0000, #ff4444)';
            }

            spawnPlane() {
                const types = ['fighter', 'dive_bomber', 'torpedo_bomber'];
                const weights = [0.5, 0.3, 0.2];
                const rand = Math.random();
                let type = types[0];
                let cum = 0;
                for (let i = 0; i < types.length; i++) { cum += weights[i]; if (rand <= cum) { type = types[i]; break; } }

                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 40;
                const height = 3 + Math.random() * 25;

                const plane = {
                    type,
                    position: new THREE.Vector3(Math.cos(angle) * distance, height, Math.sin(angle) * distance),
                    velocity: new THREE.Vector3(),
                    speed: 7 + Math.random() * 7 + this.difficulty * 2.5,
                    health: type === 'fighter' ? 2 : 3,
                    attackCooldown: 0,
                    alive: true,
                    group: null,
                };

                const toShip = new THREE.Vector3(0, 1.5, 0).sub(plane.position).normalize();
                plane.velocity.copy(toShip.multiplyScalar(plane.speed));
                plane.group = new THREE.Group();
                plane.group.position.copy(plane.position);

                const fuse = new THREE.Mesh(
                    new THREE.ConeGeometry(0.35, 2.2, 6),
                    new THREE.MeshStandardMaterial({
                        color: type === 'fighter' ? 0x5a6a4a : type === 'dive_bomber' ? 0x6a4a3a : 0x4a5a3a,
                        roughness: 0.45, metalness: 0.4
                    })
                );
                fuse.rotation.x = Math.PI / 2;
                fuse.position.z = -0.9;
                fuse.castShadow = true;
                plane.group.add(fuse);

                const wing = new THREE.Mesh(
                    new THREE.BoxGeometry(3.5, 0.08, 1),
                    new THREE.MeshStandardMaterial({ color: 0x4a4a3a, roughness: 0.55, metalness: 0.3 })
                );
                wing.position.z = -0.7;
                wing.castShadow = true;
                plane.group.add(wing);

                const tail = new THREE.Mesh(
                    new THREE.BoxGeometry(1.3, 0.25, 0.4),
                    new THREE.MeshStandardMaterial({ color: 0x4a4a3a, roughness: 0.55, metalness: 0.3 })
                );
                tail.position.set(0, 0.15, 0.4);
                plane.group.add(tail);

                plane.propeller = new THREE.Mesh(
                    new THREE.BoxGeometry(0.08, 1.3, 0.08),
                    new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.25, metalness: 0.8 })
                );
                plane.propeller.position.z = -2;
                plane.group.add(plane.propeller);

                const hinomaru = new THREE.Mesh(
                    new THREE.CircleGeometry(0.25, 16),
                    new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide })
                );
                hinomaru.position.set(0, 0, -0.4);
                hinomaru.rotation.y = Math.PI;
                plane.group.add(hinomaru);

                plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                this.scene.add(plane.group);
                this.planes.push(plane);
                this.planeMeshes.push(plane);
            }

            fireBullet() {
                if (this.fireCooldown > 0) return;
                const bulletSpeed = 55;
                const dir = new THREE.Vector3(0, 0, -1);
                dir.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));

                for (let i = 0; i < 2; i++) {
                    const offset = (i - 0.5) * 0.35;
                    const barrelTip = new THREE.Vector3(offset, 0, -4.0);
                    barrelTip.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                    barrelTip.add(this.gunsGroup.getWorldPosition(new THREE.Vector3()));

                    const spread = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.04,
                        (Math.random() - 0.5) * 0.04,
                        (Math.random() - 0.5) * 0.04
                    );
                    const finalDir = dir.clone().add(spread).normalize();

                    const bullet = {
                        position: barrelTip.clone(),
                        velocity: finalDir.multiplyScalar(bulletSpeed),
                        life: 1.8,
                        tracer: null,
                    };

                    const tGeom = new THREE.SphereGeometry(0.06, 4, 4);
                    bullet.tracer = new THREE.Mesh(tGeom, new THREE.MeshBasicMaterial({ color: 0xffff44 }));
                    bullet.tracer.position.copy(bullet.position);
                    this.scene.add(bullet.tracer);
                    this.bulletMeshes.push(bullet.tracer);
                    this.bullets.push(bullet);
                }

                this.fireCooldown = this.fireRate;
                this.muzzleFlash = 0.05;
                this.audio.playGunshot();
                this.vibration.gunshotVibrate();
            }

            createExplosion(position, size = 1) {
                const particles = [];
                const count = Math.floor(22 * size);
                for (let i = 0; i < count; i++) {
                    const p = new THREE.Mesh(
                        new THREE.SphereGeometry(0.1 * size, 4, 4),
                        new THREE.MeshBasicMaterial({
                            color: new THREE.Color().setHSL(0.07 + Math.random() * 0.18, 1, 0.35 + Math.random() * 0.55)
                        })
                    );
                    p.position.copy(position);
                    p.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 12 * size,
                        (Math.random() - 0.5) * 12 * size,
                        (Math.random() - 0.5) * 12 * size
                    );
                    p.life = 0.5 + Math.random() * 0.7;
                    p.age = 0;
                    this.scene.add(p);
                    particles.push(p);
                }
                const light = new THREE.PointLight(0xff5500, 4 * size, 12 * size);
                light.position.copy(position);
                light.life = 0.25;
                light.age = 0;
                light.isLight = true;
                particles.push(light);
                this.explosionParticles.push({ particles, age: 0, life: 0.9 });
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
            }

            damageShip(amount) {
                this.health -= amount;
                if (this.health <= 0) { this.health = 0;
                    this.updateHUD();
                    this.gameOver(); return; }
                this.audio.playHit();
                this.vibration.hitVibrate();
                this.showMessage('¡IMPACTO! -' + amount, 1000);
                this.updateHUD();
                this.hitEffects.push({ timer: 0.4, intensity: amount / 20 });
            }

            update(delta) {
                if (!this.gameRunning) { this.updateOcean(delta);
                    this.updateExplosions(delta); return; }

                this.gameTime += delta;
                this.fireCooldown = Math.max(0, this.fireCooldown - delta);
                this.muzzleFlash = Math.max(0, this.muzzleFlash - delta);
                this.difficulty = 1 + Math.floor(this.gameTime / 30);
                this.spawnInterval = Math.max(0.7, 3.5 - this.difficulty * 0.35);

                this.spawnTimer += delta;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnPlane();
                    if (this.difficulty >= 3 && Math.random() < 0.5) {
                        setTimeout(() => { if (this.gameRunning) this.spawnPlane(); }, Math.random() * 800);
                    }
                }

                // Input: giroscopio o fallback táctil
                let steer = this.steerInput;
                let pitch = this.pitchInput;
                if (!this.gyroAvailable || !this.calibrated) {
                    if (this._fbYaw) steer = this._fbYaw();
                    if (this._fbPitch) pitch = this._fbPitch();
                }

                this.targetYaw = steer;
                this.targetPitch = pitch;

                // Suavizado de torreta
                this.turretYaw += (this.targetYaw - this.turretYaw) * Math.min(delta * 6, 1);
                this.turretPitch += (this.targetPitch - this.turretPitch) * Math.min(delta * 8, 1);
                this.turretPitch = THREE.MathUtils.clamp(this.turretPitch, -0.7, 0.5);

                this.turretGroup.rotation.y = this.turretYaw;
                this.gunsGroup.rotation.x = this.turretPitch;

                // Cámara en primera persona: detrás de los cañones mirando al horizonte
                const camOffset = new THREE.Vector3(0, 1.5, 1.5);
                camOffset.applyQuaternion(this.turretGroup.quaternion);
                this.camera.position.copy(this.turretGroup.position.clone().add(camOffset));

                // Mirar hacia adelante (donde apuntan los cañones) con elevación
                const lookDir = new THREE.Vector3(0, 0, -20);
                lookDir.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                const lookTarget = this.gunsGroup.getWorldPosition(new THREE.Vector3()).add(lookDir);
                this.camera.lookAt(lookTarget);

                if (this.isFiring && this.fireCooldown <= 0) this.fireBullet();

                this.scene.fog = this.muzzleFlash > 0 ?
                    new THREE.FogExp2(new THREE.Color().lerpColors(new THREE.Color(0x8cc8e8), new THREE.Color(0xffcc66),
                        this.muzzleFlash / 0.05), 0.00008 + (this.muzzleFlash / 0.05) * 0.0002) :
                    new THREE.FogExp2(0x8cc8e8, 0.00008);

                // Balas
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.position.add(b.velocity.clone().multiplyScalar(delta));
                    b.life -= delta;
                    b.tracer.position.copy(b.position);
                    if (b.life <= 0 || b.position.y < -3 || Math.abs(b.position.x) > 80 || Math.abs(b.position.z) > 80) {
                        this.scene.remove(b.tracer);
                        const idx = this.bulletMeshes.indexOf(b.tracer);
                        if (idx > -1) this.bulletMeshes.splice(idx, 1);
                        this.bullets.splice(i, 1);
                        continue;
                    }
                    for (let j = this.planes.length - 1; j >= 0; j--) {
                        const plane = this.planes[j];
                        if (!plane.alive) continue;
                        if (b.position.distanceTo(plane.group.position) < 2.2) {
                            plane.health--;
                            if (plane.health <= 0) { this.destroyPlane(j);
                                this.score += 100;
                                this.showMessage('¡DERRIBADO! +100', 1200); } else { this.showMessage('¡IMPACTO!',
                                500);
                                this.audio.playHit(); }
                            this.scene.remove(b.tracer);
                            const idx = this.bulletMeshes.indexOf(b.tracer);
                            if (idx > -1) this.bulletMeshes.splice(idx, 1);
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                // Aviones
                for (let i = this.planes.length - 1; i >= 0; i--) {
                    const plane = this.planes[i];
                    if (!plane.alive) continue;
                    plane.position.add(plane.velocity.clone().multiplyScalar(delta));
                    plane.group.position.copy(plane.position);
                    plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                    if (plane.propeller) plane.propeller.rotation.z += delta * 45;
                    plane.attackCooldown = Math.max(0, plane.attackCooldown - delta);
                    const dist = plane.position.length();
                    if (dist < 28 && plane.attackCooldown <= 0) {
                        if (plane.type === 'fighter') {
                            plane.attackCooldown = 1.8;
                            this.damageShip(2 + Math.floor(this.difficulty / 2));
                        } else if (plane.type === 'dive_bomber' && plane.position.y > 7 && dist < 18) {
                            plane.attackCooldown = 3.5;
                            plane.velocity.y = -18;
                            setTimeout(() => {
                                if (plane.alive && this.gameRunning) {
                                    this.damageShip(12 + this.difficulty * 2);
                                    this.createExplosion(new THREE.Vector3((Math.random() - 0.5) * 12, 1.5, (Math.random() -
                                        0.5) * 22), 0.7);
                                }
                            }, 700);
                        } else if (plane.type === 'torpedo_bomber' && plane.position.y < 2.5 && dist < 22) {
                            plane.attackCooldown = 5;
                            this.damageShip(18 + this.difficulty * 3);
                            this.createExplosion(new THREE.Vector3(0, -0.5, (Math.random() - 0.5) * 18), 1.1);
                            this.showMessage('¡TORPEDO! -' + (18 + this.difficulty * 3), 1500);
                        }
                    }
                    if (Math.abs(plane.position.x) > 70 || Math.abs(plane.position.z) > 70 || plane.position.y > 40 || plane
                        .position.y < -8) this.removePlane(i);
                }

                if (Math.floor(this.gameTime) > Math.floor(this.gameTime - delta)) this.score += 10;
                this.updateExplosions(delta);
                for (let i = this.hitEffects.length - 1; i >= 0; i--) {
                    this.hitEffects[i].timer -= delta;
                    if (this.hitEffects[i].timer <= 0) this.hitEffects.splice(i, 1);
                }
                this.updateOcean(delta);
                this.updateHUD();
            }

            destroyPlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.createExplosion(plane.group.position.clone(), 0.65);
                this.scene.remove(plane.group);
                const idx = this.planeMeshes.indexOf(plane);
                if (idx > -1) this.planeMeshes.splice(idx, 1);
                this.planes.splice(index, 1);
            }

            removePlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.scene.remove(plane.group);
                const idx = this.planeMeshes.indexOf(plane);
                if (idx > -1) this.planeMeshes.splice(idx, 1);
                this.planes.splice(index, 1);
            }

            updateExplosions(delta) {
                for (let i = this.explosionParticles.length - 1; i >= 0; i--) {
                    const exp = this.explosionParticles[i];
                    exp.age += delta;
                    for (let j = exp.particles.length - 1; j >= 0; j--) {
                        const p = exp.particles[j];
                        if (p.isLight) {
                            p.age += delta;
                            p.intensity = 4 * (1 - p.age / p.life);
                            if (p.age >= p.life) { this.scene.remove(p);
                                exp.particles.splice(j, 1); }
                        } else {
                            p.age += delta;
                            p.position.add(p.velocity.clone().multiplyScalar(delta));
                            p.velocity.y += 1.5 * delta;
                            p.material.opacity = 1 - p.age / p.life;
                            p.material.transparent = true;
                            p.scale.setScalar(Math.max(0.05, 1 - p.age / p.life));
                            if (p.age >= p.life) { this.scene.remove(p);
                                exp.particles.splice(j, 1); }
                        }
                    }
                    if (exp.particles.length === 0) this.explosionParticles.splice(i, 1);
                }
            }

            updateOcean(delta) {
                if (!this.ocean || !this.oceanVertices) return;
                const positions = this.ocean.geometry.attributes.position.array;
                const time = performance.now() * 0.001;
                for (let i = 0; i < positions.length; i += 3) {
                    const x = this.oceanVertices[i];
                    const y = this.oceanVertices[i + 1];
                    positions[i + 2] = Math.sin(x * 0.2 + time) * Math.cos(y * 0.2 + time * 0.7) * 0.6 +
                        Math.sin(x * 0.1 + time * 1.2) * 0.3;
                }
                this.ocean.geometry.attributes.position.needsUpdate = true;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const now = performance.now();
                const delta = Math.min((now - this.lastTime) / 1000, 0.1);
                this.lastTime = now;
                this.update(delta);
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== INICIAR ====================
        const game = new MidwayGame();
        game.init();

        if ('serviceWorker' in navigator) {
            const swCode = `
            self.addEventListener('install', (e) => { self.skipWaiting(); });
            self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });
          `;
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' })))
                .catch(() => {});
        }

        console.log('⚓ Batalla de Midway v5 - Sin torre, cañones abajo, giroscopio unificado');
        console.log('🚗 Volante = girar torreta | ✈️ Cabeceo = elevar cañones');
        console.log('📱 Funciona en vertical y horizontal con el mismo gesto');
    </script>
</body>
