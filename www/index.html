    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
            font-family: 'Courier New', monospace;
            position: fixed;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 10px;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #score {
            font-size: 22px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #health-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ff4444;
            border-radius: 10px;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
        }

        #health-label {
            color: #fff;
            font-size: 11px;
            text-align: center;
            margin-top: 2px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
        }

        #crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            height: 2px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        #crosshair-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
        }

        #game-over-screen h1 {
            color: #ff4444;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0000;
        }

        #game-over-screen .final-score {
            color: #fff;
            font-size: 28px;
            margin: 10px 0;
        }

        #game-over-screen .ranking {
            color: #ffcc00;
            font-size: 16px;
            margin: 15px 0;
            text-align: center;
            max-height: 200px;
            overflow-y: auto;
        }

        #game-over-screen button {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;
        }

        #game-over-screen button:active {
            background: #cc0000;
            transform: scale(0.95);
        }

        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 20;
        }

        #splash-screen h1 {
            color: #ffcc00;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px #ff8800;
            text-align: center;
        }

        #splash-screen .subtitle {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        #splash-screen .instructions {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        #splash-screen button {
            background: #ff8800;
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: all;
        }

        #splash-screen button:active {
            background: #ffaa00;
            transform: scale(0.95);
        }

        #permission-request {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 136, 0, 0.9);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            pointer-events: all;
            z-index: 25;
            display: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

    <div id="ui">

    <script type="importmap">

    <script type="module">
        import * as THREE from 'three';

        // ==================== SISTEMA DE AUDIO ====================
        class AudioSystem {
            constructor() {
                this.ctx = null;
                this.initialized = false;
                this.masterGain = null;
            }

            init() {
                if (this.initialized) return;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.5;
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                } catch (e) {
                    console.warn('Audio no disponible:', e);
                }
            }

            playGunshot() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now);
                filter.frequency.exponentialRampToValueAtTime(100, now + 0.15);

                gain.gain.setValueAtTime(0.8, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);

                osc.start(now);
                osc.stop(now + 0.2);

                // Ruido de impacto
                const bufferSize = this.ctx.sampleRate * 0.1;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                }
                const noise = this.ctx.createBufferSource();
                const noiseGain = this.ctx.createGain();
                noise.buffer = buffer;
                noiseGain.gain.setValueAtTime(0.6, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                noise.connect(noiseGain);
                noiseGain.connect(this.masterGain);
                noise.start(now);
            }

            playExplosion() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.8);

                gain.gain.setValueAtTime(1.0, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 1.0);

                // Ruido explosivo
                const bufferSize = this.ctx.sampleRate * 0.8;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.2));
                }
                const noise = this.ctx.createBufferSource();
                const noiseGain = this.ctx.createGain();
                noise.buffer = buffer;
                noiseGain.gain.setValueAtTime(0.8, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                noise.connect(noiseGain);
                noiseGain.connect(this.masterGain);
                noise.start(now);
            }

            playHit() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);

                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 0.4);
            }

            playAlarm() {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.3);
                osc.frequency.setValueAtTime(600, now + 0.6);
                osc.frequency.setValueAtTime(800, now + 0.9);

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(now);
                osc.stop(now + 1.2);
            }
        }

        // ==================== SISTEMA DE VIBRACIÓN ====================
        class VibrationSystem {
            constructor() {
                this.enabled = false;
            }

            requestPermission() {
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                    this.enabled = true;
                }
            }

            vibrate(pattern) {
                if (this.enabled && navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            }

            gunshotVibrate() {
                this.vibrate([30, 20, 30]);
            }

            explosionVibrate() {
                this.vibrate([100, 50, 100, 50, 200]);
            }

            hitVibrate() {
                this.vibrate([200, 100, 200]);
            }
        }

        // ==================== JUEGO PRINCIPAL ====================
        class MidwayGame {
            constructor() {
                this.audio = new AudioSystem();
                this.vibration = new VibrationSystem();

                this.score = 0;
                this.health = 100;
                this.gameRunning = false;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.0;

                // Estado del giroscopio
                this.gyroYaw = 0; // izquierda/derecha (alpha)
                this.gyroPitch = 0; // arriba/abajo (beta)
                this.gyroAvailable = false;
                this.initialAlpha = null;
                this.initialBeta = null;

                // Torreta
                this.turretYaw = 0;
                this.turretPitch = 0;
                this.targetYaw = 0;
                this.targetPitch = 0;

                // Disparo
                this.isFiring = false;
                this.fireCooldown = 0;
                this.fireRate = 0.12;
                this.bullets = [];
                this.muzzleFlash = 0;

                // Aviones enemigos
                this.planes = [];

                // Efectos
                this.explosions = [];
                this.hitEffects = [];

                // Three.js
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.turretGroup = null;
                this.gunsGroup = null;
                this.ocean = null;
                this.ship = null;
                this.bulletMeshes = [];
                this.planeMeshes = [];
                this.explosionParticles = [];

                // DOM
                this.scoreElement = document.getElementById('score');
                this.healthBar = document.getElementById('health-bar');
                this.messageElement = document.getElementById('message');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.splashScreen = document.getElementById('splash-screen');
                this.permissionRequest = document.getElementById('permission-request');
                this.finalScoreElement = document.getElementById('final-score');
                this.rankingElement = document.getElementById('ranking');
            }

            init() {
                // Configurar Three.js
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x3a6b8f);
                this.scene.fog = new THREE.FogExp2(0x6b9ec4, 0.00015);

                // Cámara
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 500);
                this.camera.position.set(0, 3, 0);
                this.camera.lookAt(0, 2, -10);

                // Luces
                const ambientLight = new THREE.AmbientLight(0x6688aa, 0.8);
                this.scene.add(ambientLight);

                const sunLight = new THREE.DirectionalLight(0xffeedd, 3.0);
                sunLight.position.set(50, 40, 20);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 2048;
                sunLight.shadow.mapSize.height = 2048;
                sunLight.shadow.camera.near = 0.5;
                sunLight.shadow.camera.far = 200;
                sunLight.shadow.camera.left = -80;
                sunLight.shadow.camera.right = 80;
                sunLight.shadow.camera.top = 80;
                sunLight.shadow.camera.bottom = -80;
                this.scene.add(sunLight);

                const hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x224466, 0.6);
                this.scene.add(hemisphereLight);

                // Océano
                this.createOcean();

                // Barco
                this.createShip();

                // Torreta
                this.createTurret();

                // Event listeners
                this.setupEventListeners();
                this.setupGyroscope();

                // Iniciar loop
                this.lastTime = performance.now();
                this.animate();
            }

            createOcean() {
                const oceanGeometry = new THREE.PlaneGeometry(300, 300, 100, 100);
                const oceanMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a3a5c,
                    roughness: 0.3,
                    metalness: 0.6,
                    flatShading: false,
                });

                this.ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
                this.ocean.rotation.x = -Math.PI / 2;
                this.ocean.position.y = -1.5;
                this.ocean.receiveShadow = true;
                this.scene.add(this.ocean);

                // Ondas animadas
                this.oceanVertices = oceanGeometry.attributes.position.array.slice();
            }

            createShip() {
                this.ship = new THREE.Group();

                // Cubierta del portaaviones
                const deckGeometry = new THREE.BoxGeometry(30, 1.5, 70);
                const deckMaterial = new THREE.MeshStandardMaterial({
                    color: 0x555555,
                    roughness: 0.7,
                    metalness: 0.3,
                });
                const deck = new THREE.Mesh(deckGeometry, deckMaterial);
                deck.position.y = 1;
                deck.castShadow = true;
                deck.receiveShadow = true;
                this.ship.add(deck);

                // Isla del portaaviones
                const islandGeometry = new THREE.BoxGeometry(5, 6, 12);
                const islandMaterial = new THREE.MeshStandardMaterial({
                    color: 0x444444,
                    roughness: 0.6,
                    metalness: 0.4,
                });
                const island = new THREE.Mesh(islandGeometry, islandMaterial);
                island.position.set(10, 4.5, -5);
                island.castShadow = true;
                island.receiveShadow = true;
                this.ship.add(island);

                // Torre de control
                const towerGeometry = new THREE.BoxGeometry(3, 3, 4);
                const towerMaterial = new THREE.MeshStandardMaterial({
                    color: 0x555555,
                    roughness: 0.5,
                    metalness: 0.5,
                });
                const tower = new THREE.Mesh(towerGeometry, towerMaterial);
                tower.position.set(10, 8, -5);
                tower.castShadow = true;
                this.ship.add(tower);

                // Chimenea
                const funnelGeometry = new THREE.CylinderGeometry(1.5, 2, 8, 8);
                const funnelMaterial = new THREE.MeshStandardMaterial({
                    color: 0x333333,
                    roughness: 0.5,
                    metalness: 0.6,
                });
                const funnel = new THREE.Mesh(funnelGeometry, funnelMaterial);
                funnel.position.set(6, 6, -8);
                funnel.castShadow = true;
                this.ship.add(funnel);

                // Casco (bajo el agua)
                const hullGeometry = new THREE.BoxGeometry(25, 4, 65);
                const hullMaterial = new THREE.MeshStandardMaterial({
                    color: 0x772222,
                    roughness: 0.8,
                    metalness: 0.2,
                });
                const hull = new THREE.Mesh(hullGeometry, hullMaterial);
                hull.position.y = -1.5;
                this.ship.add(hull);

                this.ship.position.set(0, 0, 0);
                this.scene.add(this.ship);
            }

            createTurret() {
                this.turretGroup = new THREE.Group();
                this.turretGroup.position.set(0, 2.5, 5);

                // Base de la torreta
                const baseGeometry = new THREE.CylinderGeometry(1, 1.5, 1.5, 16);
                const baseMaterial = new THREE.MeshStandardMaterial({
                    color: 0x555555,
                    roughness: 0.5,
                    metalness: 0.7,
                });
                const base = new THREE.Mesh(baseGeometry, baseMaterial);
                base.position.y = 0;
                base.castShadow = true;
                this.turretGroup.add(base);

                // Escudo blindado
                const shieldGeometry = new THREE.BoxGeometry(2.5, 1.2, 1.5);
                const shieldMaterial = new THREE.MeshStandardMaterial({
                    color: 0x444444,
                    roughness: 0.4,
                    metalness: 0.8,
                });
                const shield = new THREE.Mesh(shieldGeometry, shieldMaterial);
                shield.position.set(0, 0.5, -0.5);
                shield.castShadow = true;
                this.turretGroup.add(shield);

                // Grupo de cañones (se inclina)
                this.gunsGroup = new THREE.Group();
                this.gunsGroup.position.set(0, 1.2, 0);

                // Cañón izquierdo
                const barrelGeom = new THREE.CylinderGeometry(0.15, 0.2, 4, 8);
                const barrelMat = new THREE.MeshStandardMaterial({
                    color: 0x333333,
                    roughness: 0.3,
                    metalness: 0.9,
                });
                const barrel1 = new THREE.Mesh(barrelGeom, barrelMat);
                barrel1.rotation.x = Math.PI / 2;
                barrel1.position.set(-0.5, 0, -2);
                barrel1.castShadow = true;
                this.gunsGroup.add(barrel1);

                const barrel2 = new THREE.Mesh(barrelGeom, barrelMat);
                barrel2.rotation.x = Math.PI / 2;
                barrel2.position.set(0.5, 0, -2);
                barrel2.castShadow = true;
                this.gunsGroup.add(barrel2);

                // Bocachas
                const muzzleGeom = new THREE.CylinderGeometry(0.22, 0.18, 0.5, 8);
                const muzzleMat = new THREE.MeshStandardMaterial({
                    color: 0x222222,
                    roughness: 0.2,
                    metalness: 1.0,
                });
                const muzzle1 = new THREE.Mesh(muzzleGeom, muzzleMat);
                muzzle1.rotation.x = Math.PI / 2;
                muzzle1.position.set(-0.5, 0, -4);
                this.gunsGroup.add(muzzle1);

                const muzzle2 = new THREE.Mesh(muzzleGeom, muzzleMat);
                muzzle2.rotation.x = Math.PI / 2;
                muzzle2.position.set(0.5, 0, -4);
                this.gunsGroup.add(muzzle2);

                this.turretGroup.add(this.gunsGroup);
                this.scene.add(this.turretGroup);
            }

            setupEventListeners() {
                // Disparo al tocar pantalla
                document.addEventListener('pointerdown', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen')) return;
                    e.preventDefault();
                    this.isFiring = true;
                    this.audio.init();
                    this.vibration.requestPermission();
                });

                document.addEventListener('pointerup', (e) => {
                    this.isFiring = false;
                });

                document.addEventListener('pointerleave', () => {
                    this.isFiring = false;
                });

                // Evitar scroll y zoom
                document.addEventListener('touchmove', (e) => {
                    if (this.gameRunning) e.preventDefault();
                }, { passive: false });

                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('gesturechange', (e) => e.preventDefault());
                document.addEventListener('gestureend', (e) => e.preventDefault());

                // Botones
                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                document.getElementById('permission-request').addEventListener('click', () => {
                    this.vibration.requestPermission();
                    document.getElementById('permission-request').style.display = 'none';
                });

                // Redimensionar
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupGyroscope() {
                if (typeof DeviceOrientationEvent !== 'undefined') {
                    window.addEventListener('deviceorientation', (event) => {
                        if (this.initialAlpha === null && event.alpha !== null) {
                            this.initialAlpha = event.alpha;
                            this.initialBeta = event.beta || 45;
                            this.gyroAvailable = true;
                        }

                        if (event.alpha !== null) {
                            let alpha = event.alpha;
                            let beta = event.beta || 45;

                            // Calibrar giro (volante)
                            let deltaAlpha = alpha - this.initialAlpha;
                            if (deltaAlpha > 180) deltaAlpha -= 360;
                            if (deltaAlpha < -180) deltaAlpha += 360;
                            this.gyroYaw = THREE.MathUtils.clamp(deltaAlpha / 90, -1.5, 1.5);

                            // Cabeceo (palanca de avión)
                            let pitch = (beta - 45) / 45;
                            this.gyroPitch = THREE.MathUtils.clamp(pitch, -0.8, 0.5);
                        }
                    });

                    // Solicitar permiso en iOS
                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        document.getElementById('splash-screen').querySelector('.instructions').innerHTML +=
                            '<br><br>📱 <b>iOS:</b> Toca "A LA BATALLA" y permite el sensor';
                        this._iosGyro = true;
                    }
                }
            }

            async requestGyroPermission() {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            this.gyroAvailable = true;
                        }
                    } catch (e) {
                        console.warn('Permiso de giroscopio denegado');
                        // Modo fallback: controles táctiles simples
                        this.setupTouchFallback();
                    }
                }
            }

            setupTouchFallback() {
                let touchX = 0,
                    touchY = 0;
                document.addEventListener('touchmove', (e) => {
                    if (!this.gameRunning) return;
                    touchX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
                    touchY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
                    this.gyroYaw = touchX * 1.5;
                    this.gyroPitch = -touchY * 0.5;
                });
                document.addEventListener('touchend', () => {
                    this.gyroYaw *= 0.9;
                    this.gyroPitch *= 0.9;
                });
            }

            startGame() {
                this.splashScreen.style.display = 'none';
                this.audio.init();
                this.vibration.requestPermission();

                if (this._iosGyro && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    this.requestGyroPermission().then(() => {
                        this.beginGameplay();
                    });
                } else {
                    this.beginGameplay();
                }

                // Mostrar solicitud de permiso de vibración
                if (!this.vibration.enabled && navigator.vibrate) {
                    document.getElementById('permission-request').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('permission-request').style.display = 'none';
                    }, 4000);
                }
            }

            beginGameplay() {
                this.score = 0;
                this.health = 100;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.0;
                this.bullets = [];
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];
                this.bulletMeshes.forEach(m => this.scene.remove(m));
                this.bulletMeshes = [];
                this.planeMeshes.forEach(p => this.scene.remove(p.group));
                this.planeMeshes = [];
                this.explosionParticles.forEach(ep => ep.particles.forEach(p => this.scene.remove(p)));
                this.explosionParticles = [];
                this.isFiring = false;
                this.fireCooldown = 0;
                this.muzzleFlash = 0;
                this.gameRunning = true;
                this.gameOverScreen.style.display = 'none';
                this.updateHUD();
                this.showMessage('¡DEFIENDE EL BUQUE!', 2000);
                this.audio.playAlarm();
                this.lastTime = performance.now();
            }

            restartGame() {
                this.beginGameplay();
            }

            gameOver() {
                this.gameRunning = false;
                this.isFiring = false;
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
                this.gameOverScreen.style.display = 'flex';
                this.finalScoreElement.textContent = `Puntuación: ${this.score}`;
                this.updateRanking();
            }

            updateRanking() {
                let rankings = JSON.parse(localStorage.getItem('midway_rankings') || '[]');
                rankings.push({
                    score: this.score,
                    time: Math.floor(this.gameTime),
                    date: new Date().toLocaleDateString(),
                });
                rankings.sort((a, b) => b.score - a.score);
                rankings = rankings.slice(0, 10);
                localStorage.setItem('midway_rankings', JSON.stringify(rankings));

                let html = '<h3>🏆 MEJORES ARTILLEROS</h3>';
                rankings.forEach((r, i) => {
                    html +=
                        `<div>${i+1}. ${r.score} pts - ${r.time}s (${r.date})</div>`;
                });
                this.rankingElement.innerHTML = html;
            }

            showMessage(text, duration = 1500) {
                this.messageElement.textContent = text;
                this.messageElement.style.opacity = '1';
                clearTimeout(this._messageTimeout);
                this._messageTimeout = setTimeout(() => {
                    this.messageElement.style.opacity = '0';
                }, duration);
            }

            updateHUD() {
                this.scoreElement.textContent = `PTS: ${this.score}`;
                this.healthBar.style.width = `${this.health}%`;
                if (this.health < 30) {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff6600)';
                } else if (this.health < 60) {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff6600, #ffaa00)';
                } else {
                    this.healthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
                }
            }

            spawnPlane() {
                const types = ['fighter', 'dive_bomber', 'torpedo_bomber'];
                const weights = [0.5, 0.3, 0.2];
                const rand = Math.random();
                let type = types[0];
                let cumulative = 0;
                for (let i = 0; i < types.length; i++) {
                    cumulative += weights[i];
                    if (rand <= cumulative) {
                        type = types[i];
                        break;
                    }
                }

                // Posición aleatoria en el horizonte
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 30;
                const height = 5 + Math.random() * 20;

                const plane = {
                    type: type,
                    position: new THREE.Vector3(
                        Math.cos(angle) * distance,
                        height,
                        Math.sin(angle) * distance
                    ),
                    velocity: new THREE.Vector3(),
                    speed: 8 + Math.random() * 5 + this.difficulty * 2,
                    health: type === 'fighter' ? 2 : 3,
                    attackTimer: 0,
                    attackCooldown: 0,
                    alive: true,
                    group: null,
                    mesh: null,
                };

                // Dirección hacia el barco
                const dirToShip = new THREE.Vector3(0, 2, 0).sub(plane.position).normalize();
                plane.velocity.copy(dirToShip.multiplyScalar(plane.speed));

                // Crear mesh del avión
                plane.group = new THREE.Group();
                plane.group.position.copy(plane.position);

                // Fuselaje
                const fuseGeom = new THREE.ConeGeometry(0.4, 2.5, 6);
                const fuseMat = new THREE.MeshStandardMaterial({
                    color: type === 'fighter' ? 0x556644 : type === 'dive_bomber' ? 0x664433 : 0x445533,
                    roughness: 0.5,
                    metalness: 0.4,
                });
                const fuse = new THREE.Mesh(fuseGeom, fuseMat);
                fuse.rotation.x = Math.PI / 2;
                fuse.position.z = -1;
                fuse.castShadow = true;
                plane.group.add(fuse);

                // Alas
                const wingGeom = new THREE.BoxGeometry(4, 0.1, 1.2);
                const wingMat = new THREE.MeshStandardMaterial({
                    color: 0x444433,
                    roughness: 0.6,
                    metalness: 0.3,
                });
                const wing = new THREE.Mesh(wingGeom, wingMat);
                wing.position.z = -0.8;
                wing.castShadow = true;
                plane.group.add(wing);

                // Cola
                const tailGeom = new THREE.BoxGeometry(1.5, 0.3, 0.5);
                const tail = new THREE.Mesh(tailGeom, wingMat);
                tail.position.set(0, 0.2, 0.5);
                plane.group.add(tail);

                // Hélice
                const propGeom = new THREE.BoxGeometry(0.1, 1.5, 0.1);
                const propMat = new THREE.MeshStandardMaterial({
                    color: 0x888888,
                    roughness: 0.3,
                    metalness: 0.8,
                });
                plane.propeller = new THREE.Mesh(propGeom, propMat);
                plane.propeller.position.z = -2.2;
                plane.group.add(plane.propeller);

                // Insignia japonesa (círculo rojo)
                const insigniaGeom = new THREE.CircleGeometry(0.3, 16);
                const insigniaMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide });
                const insignia = new THREE.Mesh(insigniaGeom, insigniaMat);
                insignia.position.set(0, 0, -0.5);
                insignia.rotation.y = Math.PI;
                plane.group.add(insignia);

                plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                plane.mesh = plane.group;

                this.scene.add(plane.group);
                this.planes.push(plane);
                this.planeMeshes.push(plane);
            }

            fireBullet() {
                if (this.fireCooldown > 0) return;

                const bulletSpeed = 60;
                const spread = 0.03;

                for (let i = 0; i < 2; i++) {
                    const offset = (i - 0.5) * 0.3;
                    const direction = new THREE.Vector3(
                        Math.sin(this.turretYaw) * Math.cos(this.turretPitch) + (Math.random() - 0.5) * spread,
                        Math.sin(this.turretPitch) + (Math.random() - 0.5) * spread,
                        -Math.cos(this.turretYaw) * Math.cos(this.turretPitch) + (Math.random() - 0.5) * spread
                    ).normalize();

                    const bullet = {
                        position: new THREE.Vector3(0, 2.5, 5).add(
                            new THREE.Vector3(offset * Math.cos(this.turretYaw), 0, offset * Math.sin(
                                this.turretYaw))
                        ),
                        velocity: direction.multiplyScalar(bulletSpeed),
                        life: 1.5,
                        tracer: null,
                    };

                    // Crear trazador
                    const tracerGeom = new THREE.SphereGeometry(0.08, 4, 4);
                    const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffff44 });
                    bullet.tracer = new THREE.Mesh(tracerGeom, tracerMat);
                    bullet.tracer.position.copy(bullet.position);
                    this.scene.add(bullet.tracer);
                    this.bulletMeshes.push(bullet.tracer);

                    this.bullets.push(bullet);
                }

                this.fireCooldown = this.fireRate;
                this.muzzleFlash = 0.06;
                this.audio.playGunshot();
                this.vibration.gunshotVibrate();
            }

            createExplosion(position, size = 1) {
                const particles = [];
                const particleCount = Math.floor(30 * size);

                for (let i = 0; i < particleCount; i++) {
                    const geom = new THREE.SphereGeometry(0.15 * size, 4, 4);
                    const mat = new THREE.MeshBasicMaterial({
                        color: new THREE.Color().setHSL(0.08 + Math.random() * 0.15, 1, 0.4 + Math.random() * 0.5),
                    });
                    const particle = new THREE.Mesh(geom, mat);
                    particle.position.copy(position);
                    particle.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 15 * size,
                        (Math.random() - 0.5) * 15 * size,
                        (Math.random() - 0.5) * 15 * size
                    );
                    particle.life = 0.6 + Math.random() * 0.8;
                    particle.age = 0;
                    this.scene.add(particle);
                    particles.push(particle);
                }

                // Luz de explosión
                const light = new THREE.PointLight(0xff6600, 5 * size, 15 * size);
                light.position.copy(position);
                this.scene.add(light);
                particles.push(light);
                light.life = 0.3;
                light.age = 0;
                light.isLight = true;

                this.explosionParticles.push({
                    particles: particles,
                    age: 0,
                    life: 1.0,
                });

                this.audio.playExplosion();
                this.vibration.explosionVibrate();
            }

            damageShip(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.health = 0;
                    this.updateHUD();
                    this.gameOver();
                    return;
                }
                this.audio.playHit();
                this.vibration.hitVibrate();
                this.showMessage('¡IMPACTO! -' + amount, 1000);
                this.updateHUD();

                // Efecto visual en el barco
                this.hitEffects.push({
                    timer: 0.5,
                    intensity: amount / 20,
                });
            }

            update(delta) {
                if (!this.gameRunning) {
                    // Seguir animando aunque no esté corriendo
                    this.updateOcean(delta);
                    this.updateExplosions(delta);
                    return;
                }

                this.gameTime += delta;
                this.fireCooldown = Math.max(0, this.fireCooldown - delta);
                this.muzzleFlash = Math.max(0, this.muzzleFlash - delta);

                // Dificultad creciente
                this.difficulty = 1 + Math.floor(this.gameTime / 30);
                this.spawnInterval = Math.max(0.8, 3.0 - this.difficulty * 0.3);

                // Spawn de aviones
                this.spawnTimer += delta;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnPlane();
                    if (this.difficulty >= 3 && Math.random() < 0.4) {
                        setTimeout(() => {
                            if (this.gameRunning) this.spawnPlane();
                        }, Math.random() * 1000);
                    }
                }

                // Actualizar torreta
                this.targetYaw = this.gyroYaw;
                this.targetPitch = this.gyroPitch;
                this.turretYaw += (this.targetYaw - this.turretYaw) * Math.min(delta * 8, 1);
                this.turretPitch += (this.targetPitch - this.turretPitch) * Math.min(delta * 8, 1);
                this.turretPitch = THREE.MathUtils.clamp(this.turretPitch, -0.6, 0.3);

                this.turretGroup.rotation.y = this.turretYaw;
                this.gunsGroup.rotation.x = this.turretPitch;

                // Disparar si se mantiene pulsado
                if (this.isFiring && this.fireCooldown <= 0) {
                    this.fireBullet();
                }

                // Muzzle flash
                if (this.muzzleFlash > 0) {
                    const flashIntensity = this.muzzleFlash / 0.06;
                    this.scene.fog = new THREE.FogExp2(
                        new THREE.Color().lerpColors(
                            new THREE.Color(0x6b9ec4),
                            new THREE.Color(0xffaa44),
                            flashIntensity
                        ),
                        0.00015 + flashIntensity * 0.0003
                    );
                } else {
                    this.scene.fog = new THREE.FogExp2(0x6b9ec4, 0.00015);
                }

                // Actualizar balas
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    bullet.position.add(bullet.velocity.clone().multiplyScalar(delta));
                    bullet.life -= delta;
                    bullet.tracer.position.copy(bullet.position);

                    if (bullet.life <= 0 || bullet.position.y < -2 || Math.abs(bullet.position.x) > 60 || Math.abs(
                            bullet.position.z) > 60) {
                        this.scene.remove(bullet.tracer);
                        const idx = this.bulletMeshes.indexOf(bullet.tracer);
                        if (idx > -1) this.bulletMeshes.splice(idx, 1);
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    // Colisión con aviones
                    for (let j = this.planes.length - 1; j >= 0; j--) {
                        const plane = this.planes[j];
                        if (!plane.alive) continue;
                        const dist = bullet.position.distanceTo(plane.group.position);
                        if (dist < 2.5) {
                            plane.health--;
                            if (plane.health <= 0) {
                                this.destroyPlane(j);
                                this.score += 100;
                                this.showMessage('¡DERRIBADO! +100', 1200);
                            } else {
                                this.showMessage('¡IMPACTO!', 600);
                                this.audio.playHit();
                            }
                            this.scene.remove(bullet.tracer);
                            const idx = this.bulletMeshes.indexOf(bullet.tracer);
                            if (idx > -1) this.bulletMeshes.splice(idx, 1);
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                // Actualizar aviones
                for (let i = this.planes.length - 1; i >= 0; i--) {
                    const plane = this.planes[i];
                    if (!plane.alive) continue;

                    plane.position.add(plane.velocity.clone().multiplyScalar(delta));
                    plane.group.position.copy(plane.position);

                    // Orientar hacia la dirección de vuelo
                    const lookTarget = new THREE.Vector3().addVectors(plane.position, plane.velocity);
                    plane.group.lookAt(lookTarget);

                    // Rotar hélice
                    if (plane.propeller) {
                        plane.propeller.rotation.z += delta * 40;
                    }

                    // IA de ataque
                    plane.attackCooldown = Math.max(0, plane.attackCooldown - delta);

                    const distToShip = plane.position.length();
                    if (distToShip < 30 && plane.attackCooldown <= 0) {
                        if (plane.type === 'fighter') {
                            // Ametrallamiento
                            plane.attackCooldown = 1.5;
                            this.damageShip(3 + Math.floor(this.difficulty / 2));
                        } else if (plane.type === 'dive_bomber' && plane.position.y > 8 && distToShip < 20) {
                            // Bombardeo en picado
                            plane.attackCooldown = 3;
                            plane.velocity.y = -15;
                            setTimeout(() => {
                                if (plane.alive && this.gameRunning) {
                                    this.damageShip(15 + this.difficulty * 2);
                                    this.createExplosion(
                                        new THREE.Vector3(
                                            (Math.random() - 0.5) * 10,
                                            1.5,
                                            (Math.random() - 0.5) * 20
                                        ),
                                        0.8
                                    );
                                }
                            }, 800);
                        } else if (plane.type === 'torpedo_bomber' && plane.position.y < 3 && distToShip < 25) {
                            // Torpedo
                            plane.attackCooldown = 5;
                            this.damageShip(20 + this.difficulty * 3);
                            this.createExplosion(
                                new THREE.Vector3(0, 0, (Math.random() - 0.5) * 15),
                                1.2
                            );
                            this.showMessage('¡TORPEDO! -' + (20 + this.difficulty * 3), 1500);
                        }
                    }

                    // Si el avión se aleja demasiado, respawnear
                    if (Math.abs(plane.position.x) > 60 || Math.abs(plane.position.z) > 60 || plane.position.y > 35 ||
                        plane.position.y < -5) {
                        this.removePlane(i);
                    }
                }

                // Puntuación por tiempo
                if (Math.floor(this.gameTime) > Math.floor(this.gameTime - delta)) {
                    this.score += 10;
                }

                // Actualizar explosiones
                this.updateExplosions(delta);

                // Actualizar efectos de impacto en barco
                for (let i = this.hitEffects.length - 1; i >= 0; i--) {
                    this.hitEffects[i].timer -= delta;
                    if (this.hitEffects[i].timer <= 0) {
                        this.hitEffects.splice(i, 1);
                    }
                }

                // Actualizar océano
                this.updateOcean(delta);

                // Actualizar HUD
                this.updateHUD();

                // Aplicar shake de cámara por impactos
                const totalShake = this.hitEffects.reduce((sum, e) => sum + e.intensity * (e.timer / 0.5), 0);
                const shakeX = (Math.random() - 0.5) * totalShake * 0.5;
                const shakeY = (Math.random() - 0.5) * totalShake * 0.3;
                this.camera.position.set(shakeX, 3 + shakeY, 0);
            }

            destroyPlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.createExplosion(plane.group.position.clone(), 0.7);
                this.scene.remove(plane.group);
                const meshIdx = this.planeMeshes.indexOf(plane);
                if (meshIdx > -1) this.planeMeshes.splice(meshIdx, 1);
                this.planes.splice(index, 1);
            }

            removePlane(index) {
                const plane = this.planes[index];
                plane.alive = false;
                this.scene.remove(plane.group);
                const meshIdx = this.planeMeshes.indexOf(plane);
                if (meshIdx > -1) this.planeMeshes.splice(meshIdx, 1);
                this.planes.splice(index, 1);
            }

            updateExplosions(delta) {
                for (let i = this.explosionParticles.length - 1; i >= 0; i--) {
                    const explosion = this.explosionParticles[i];
                    explosion.age += delta;

                    for (let j = explosion.particles.length - 1; j >= 0; j--) {
                        const p = explosion.particles[j];
                        if (p.isLight) {
                            p.age += delta;
                            p.intensity = 5 * (1 - p.age / p.life);
                            if (p.age >= p.life) {
                                this.scene.remove(p);
                                explosion.particles.splice(j, 1);
                            }
                        } else {
                            p.age += delta;
                            p.position.add(p.velocity.clone().multiplyScalar(delta));
                            p.velocity.y += 2 * delta; // Gravedad
                            p.material.opacity = 1 - p.age / p.life;
                            p.material.transparent = true;
                            const scale = 1 - p.age / p.life;
                            p.scale.setScalar(Math.max(0.1, scale));

                            if (p.age >= p.life) {
                                this.scene.remove(p);
                                explosion.particles.splice(j, 1);
                            }
                        }
                    }

                    if (explosion.particles.length === 0) {
                        this.explosionParticles.splice(i, 1);
                    }
                }
            }

            updateOcean(delta) {
                if (!this.ocean || !this.oceanVertices) return;
                const positions = this.ocean.geometry.attributes.position.array;
                const time = performance.now() * 0.001;

                for (let i = 0; i < positions.length; i += 3) {
                    const x = this.oceanVertices[i];
                    const y = this.oceanVertices[i + 1];
                    positions[i + 2] = Math.sin(x * 0.3 + time) * Math.cos(y * 0.3 + time * 0.7) * 0.8 +
                        Math.sin(x * 0.15 + time * 1.3) * 0.4;
                }
                this.ocean.geometry.attributes.position.needsUpdate = true;
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const now = performance.now();
                const delta = Math.min((now - this.lastTime) / 1000, 0.1);
                this.lastTime = now;

                this.update(delta);

                // Actualizar cámara para seguir torreta
                if (this.gameRunning || this.planes.length > 0) {
                    const camTarget = new THREE.Vector3(0, 2.5, 5);
                    camTarget.applyQuaternion(this.turretGroup.quaternion);
                    camTarget.add(this.turretGroup.position);
                    this.camera.lookAt(camTarget.x, camTarget.y + 1, camTarget.z - 8);
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== INICIAR ====================
        const game = new MidwayGame();
        game.init();

        // Service Worker para PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
            self.addEventListener('install', (e) => {
              self.skipWaiting();
            });
            self.addEventListener('activate', (e) => {
              e.waitUntil(clients.claim());
            });
            self.addEventListener('fetch', (e) => {
              e.respondWith(fetch(e.request));
            });
          `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
