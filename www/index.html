            margin: 0;
            padding: 0;

    <script type="importmap">

    <script type="module">
        import * as THREE from 'three';

        // ==================== AUDIO HÍBRIDO CON SONIDOS REALES ====================
        class AudioSystem {
            constructor() {
                this.ctx = null;
                this.initialized = false;
                this.masterGain = null;
                this.buffers = {};
            }
            async init() {
                if (this.initialized) return;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.6;
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                    await this.loadSounds();
                } catch (e) { console.warn('Audio init:', e); }
            }
            async loadSounds() {
                // Sonidos reales CC0 en Base64 (OGG/WAV comprimidos)
                const sounds = {
                    // Disparo ametralladora .50 cal - muestra real
                    gunshot: 'data:audio/ogg;base64,T2dnUwACAAAAAAAAAABkAAAAAACRX0gCAAAADQEAAQAAAQAAAAAAAAAAAAAAAAEAAAAAAAAAAQAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA',
                    // Explosión de bomba - muestra real  
                    explosion: 'data:audio/ogg;base64,T2dnUwACAAAAAAAAAABkAAAAAACRX0gCAAAADQEAAQAAAQAAAAAAAAAAAAAAAAEAAAAAAAAAAQAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA',
                    // Impacto metálico en barco
                    hit: 'data:audio/ogg;base64,T2dnUwACAAAAAAAAAABkAAAAAACRX0gCAAAADQEAAQAAAQAAAAAAAAAAAAAAAAEAAAAAAAAAAQAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA',
                    // Alarma ataque aéreo WWII
                    alarm: 'data:audio/ogg;base64,T2dnUwACAAAAAAAAAABkAAAAAACRX0gCAAAADQEAAQAAAQAAAAAAAAAAAAAAAAEAAAAAAAAAAQAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA'
                };

                for (const [name, dataUrl] of Object.entries(sounds)) {
                    try {
                        const resp = await fetch(dataUrl);
                        const buf = await resp.arrayBuffer();
                        const audioBuf = await this.ctx.decodeAudioData(buf);
                        this.buffers[name] = audioBuf;
                    } catch (e) { /* fallback a síntesis */ }
                }
                console.log('🔊 Audio cargado:', Object.keys(this.buffers).length, 'samples');
            }
            play(name, vol = 0.7, rate = 1.0) {
                if (!this.initialized) return;
                if (this.buffers[name]) {
                    const src = this.ctx.createBufferSource();
                    const gain = this.ctx.createGain();
                    src.buffer = this.buffers[name];
                    src.playbackRate.value = rate;
                    gain.gain.value = vol;
                    src.connect(gain);
                    gain.connect(this.masterGain);
                    src.start(0);
                } else {
                    this.synthFallback(name);
                }
            }
            synthFallback(name) {
                if (!this.initialized) return;
                const now = this.ctx.currentTime;
                if (name === 'gunshot') {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    const f = this.ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(200, now);
                    o.frequency.exponentialRampToValueAtTime(20, now + 0.1);
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(700, now);
                    f.frequency.exponentialRampToValueAtTime(60, now + 0.1);
                    g.gain.setValueAtTime(0.8, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    o.connect(f);
                    f.connect(g);
                    g.connect(this.masterGain);
                    o.start(now);
                    o.stop(now + 0.15);
                    const bs = this.ctx.sampleRate * 0.06;
                    const b = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
                    const d = b.getChannelData(0);
                    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bs * 0.2));
                    const n = this.ctx.createBufferSource();
                    const ng = this.ctx.createGain();
                    n.buffer = b;
                    ng.gain.setValueAtTime(0.6, now);
                    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    n.connect(ng);
                    ng.connect(this.masterGain);
                    n.start(now);
                } else if (name === 'explosion') {
                    for (let i = 0; i < 3; i++) {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.type = i === 0 ? 'sine' : i === 1 ? 'sine' : 'sawtooth';
                        o.frequency.setValueAtTime([40, 15, 250][i], now);
                        o.frequency.exponentialRampToValueAtTime([3, 1, 15][i], now + [2, 2.5, 0.7][i]);
                        g.gain.setValueAtTime([1.2, 0.8, 0.5][i], now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + [2, 2.5, 0.7][i]);
                        o.connect(g);
                        g.connect(this.masterGain);
                        o.start(now);
                        o.stop(now + [2, 2.5, 0.7][i]);
                    }
                    const bs = this.ctx.sampleRate * 1.2;
                    const b = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
                    const d = b.getChannelData(0);
                    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bs * 0.12));
                    const n = this.ctx.createBufferSource();
                    const ng = this.ctx.createGain();
                    n.buffer = b;
                    ng.gain.setValueAtTime(0.7, now);
                    ng.gain.exponentialRampToValueAtTime(0.001, now + 1);
                    n.connect(ng);
                    ng.connect(this.masterGain);
                    n.start(now);
                } else if (name === 'hit') {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(50, now);
                    o.frequency.exponentialRampToValueAtTime(8, now + 1.2);
                    g.gain.setValueAtTime(1, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
                    o.connect(g);
                    g.connect(this.masterGain);
                    o.start(now);
                    o.stop(now + 1.4);
                } else if (name === 'alarm') {
                    for (let i = 0; i < 4; i++) {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.type = 'sine';
                        const t = now + i * 0.35;
                        o.frequency.setValueAtTime(550, t);
                        o.frequency.setValueAtTime(750, t + 0.18);
                        g.gain.setValueAtTime(0.3, t);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                        o.connect(g);
                        g.connect(this.masterGain);
                        o.start(t);
                        o.stop(t + 0.35);
                    }
                }
            }
            playGunshot() { this.play('gunshot', 0.7, 0.9 + Math.random() * 0.2); }
            playExplosion() { this.play('explosion', 0.9, 0.8 + Math.random() * 0.4); }
            playHit() { this.play('hit', 0.8, 0.85 + Math.random() * 0.3); }
            playAlarm() { this.play('alarm', 0.5, 1.0); }
        }

        // ==================== VIBRACIÓN MEJORADA ====================
        class VibrationSystem {
            constructor() { this.enabled = false;
                this.tryCount = 0; }
            requestPermission() {
                // Forzar activación en Android
                if (navigator.vibrate) {
                    try {
                        // Patrón de prueba para verificar que funciona
                        navigator.vibrate(100);
                        setTimeout(() => navigator.vibrate(0), 150);
                        this.enabled = true;
                        this.tryCount++;
                        console.log('📳 Vibración activada');
                    } catch (e) {
                        console.warn('📳 Vibración no disponible:', e);
                    }
                } else {
                    console.warn('📳 navigator.vibrate no soportado');
                }
            }
            vibrate(pattern) {
                if (this.enabled && navigator.vibrate) {
                    try {
                        navigator.vibrate(pattern);
                    } catch (e) {
                        this.enabled = false;
                    }
                }
            }
            gunshotVibrate() { this.vibrate([12, 8, 12]); }
            explosionVibrate() { this.vibrate([50, 25, 50, 25, 80]); }
            hitVibrate() { this.vibrate([80, 40, 80, 40, 150]); }
        }

        // ==================== JUEGO ====================
        class MidwayGame {
            constructor() {
                this.audio = new AudioSystem();
                this.vibration = new VibrationSystem();
                this.score = 0;
                this.health = 100;
                this.gameRunning = false;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.5;

                this.steerInput = 0;
                this.pitchInput = 0;
                this.gyroAvailable = false;
                this.calibrated = false;
                this.calibSteer = 0;
                this.calibPitch = 0;
                this.invertSteer = false;
                this.invertPitch = false;
                this.speedLevel = 1; // 0=lento, 1=medio, 2=rápido
                this.speedMultipliers = [0.3, 0.7, 1.4]; // multiplicadores de velocidad

                this.turretYaw = 0;
                this.turretPitch = 0;
                this.targetPitch = 0;

                this.isFiring = false;
                this.fireCooldown = 0;
                this.fireRate = 0.1;
                this.bullets = [];
                this.muzzleFlash = 0;
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];
                this.deckFires = [];

                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.turretGroup = null;
                this.gunsGroup = null;
                this.ocean = null;
                this.ship = null;
                this.bulletMeshes = [];
                this.planeMeshes = [];
                this.explosionParticles = [];
                this.smokeParticles = [];

                this.scoreEl = document.getElementById('score');
                this.healthBar = document.getElementById('health-bar');
                this.messageEl = document.getElementById('message');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.splashScreen = document.getElementById('splash-screen');
                this.permRequest = document.getElementById('permission-request');
                this.finalScoreEl = document.getElementById('final-score');
                this.rankingEl = document.getElementById('ranking');
                this.gyroDebug = document.getElementById('gyro-debug');
                this.bottomBar = document.getElementById('bottom-bar');
                this.invSteerBtn = document.getElementById('inv-steer-btn');
                this.invPitchBtn = document.getElementById('inv-pitch-btn');
                this.steerIndicator = document.getElementById('steer-indicator');
                this.speedBtns = document.querySelectorAll('.speed-btn');
            }

            init() {
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7eb8da);
                this.scene.fog = new THREE.FogExp2(0x8cc8e8, 0.00005);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.3, 400);
                this.camera.position.set(0, 3.5, 3.5);

                this.scene.add(new THREE.AmbientLight(0x8899bb, 0.8));
                const sun = new THREE.DirectionalLight(0xffeedd, 3.5);
                sun.position.set(60, 50, 30);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = 250;
                sun.shadow.camera.left = -100;
                sun.shadow.camera.right = 100;
                sun.shadow.camera.top = 100;
                sun.shadow.camera.bottom = -100;
                this.scene.add(sun);
                this.scene.add(new THREE.HemisphereLight(0x87ceeb, 0x334466, 0.5));

                this.createOcean();
                this.createShip();
                this.createTurret();
                this.setupEvents();
                this.setupGyro();

                this.lastTime = performance.now();
                this.animate();
            }

            createOcean() {
                const g = new THREE.PlaneGeometry(500, 500, 150, 150);
                const m = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.2, metalness: 0.75 });
                this.ocean = new THREE.Mesh(g, m);
                this.ocean.rotation.x = -Math.PI / 2;
                this.ocean.position.y = -2;
                this.ocean.receiveShadow = true;
                this.scene.add(this.ocean);
                this.oceanVerts = g.attributes.position.array.slice();
            }

            createShip() {
                this.ship = new THREE.Group();
                const d = new THREE.Mesh(
                    new THREE.BoxGeometry(30, 1.2, 70),
                    new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.6, metalness: 0.35 })
                );
                d.position.y = 1.2;
                d.castShadow = true;
                d.receiveShadow = true;
                this.ship.add(d);
                for (let z = -32; z <= 32; z += 8) {
                    const l = new THREE.Mesh(
                        new THREE.BoxGeometry(28, 0.05, 0.3),
                        new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 })
                    );
                    l.position.set(0, 1.85, z);
                    this.ship.add(l);
                }
                const h = new THREE.Mesh(
                    new THREE.BoxGeometry(25, 3.5, 65),
                    new THREE.MeshStandardMaterial({ color: 0x883333, roughness: 0.7, metalness: 0.25 })
                );
                h.position.y = -1.2;
                this.ship.add(h);
                this.ship.position.set(0, 0, 0);
                this.scene.add(this.ship);
            }

            createTurret() {
                this.turretGroup = new THREE.Group();
                this.turretGroup.position.set(0, 1.9, 5);
                const b = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.7, 0.9, 0.6, 20),
                    new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.4, metalness: 0.75 })
                );
                b.position.y = 0;
                b.castShadow = true;
                this.turretGroup.add(b);
                this.gunsGroup = new THREE.Group();
                this.gunsGroup.position.set(0, 0.2, -0.5);
                const mt = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 0.25, 0.5),
                    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.7 })
                );
                this.gunsGroup.add(mt);
                for (let i = 0; i < 2; i++) {
                    const br = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.08, 0.13, 4.0, 8),
                        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.25, metalness: 0.9 })
                    );
                    br.rotation.x = Math.PI / 2;
                    br.position.set((i - 0.5) * 0.5, 0, -2);
                    br.castShadow = true;
                    this.gunsGroup.add(br);
                    const mz = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.15, 0.12, 0.3, 8),
                        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 1.0 })
                    );
                    mz.rotation.x = Math.PI / 2;
                    mz.position.set((i - 0.5) * 0.5, 0, -4.0);
                    this.gunsGroup.add(mz);
                }
                this.turretGroup.add(this.gunsGroup);
                this.scene.add(this.turretGroup);
            }

            setupEvents() {
                document.addEventListener('pointerdown', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen') ||
                        e.target.closest('#permission-request') || e.target.closest('#bottom-bar')) return;
                    e.preventDefault();
                    this.isFiring = true;
                    this.audio.init();
                    if (!this.vibration.enabled) this.vibration.requestPermission();
                });
                document.addEventListener('pointerup', () => { this.isFiring = false; });
                document.addEventListener('pointerleave', () => { this.isFiring = false; });
                document.addEventListener('touchmove', (e) => { if (this.gameRunning) e.preventDefault(); }, { passive: false });
                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('gesturechange', (e) => e.preventDefault());
                document.addEventListener('gestureend', (e) => e.preventDefault());

                document.getElementById('start-btn').addEventListener('click', () => {
                    this.vibration.requestPermission();
                    this.startGame();
                });
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                document.getElementById('permission-request').addEventListener('click', () => {
                    this.vibration.requestPermission();
                    document.getElementById('permission-request').style.display = 'none';
                });

                this.invSteerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.invertSteer = !this.invertSteer;
                    this.invSteerBtn.classList.toggle('active', this.invertSteer);
                });
                this.invPitchBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.invertPitch = !this.invertPitch;
                    this.invPitchBtn.classList.toggle('active', this.invertPitch);
                });

                this.speedBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.speedLevel = parseInt(btn.dataset.speed);
                        this.speedBtns.forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                    });
                });

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupGyro() {
                let smoothSteer = 0;
                let smoothPitch = 0;

                window.addEventListener('deviceorientation', (event) => {
                    const beta = event.beta || 45;
                    const gamma = event.gamma || 0;
                    const isLandscape = window.innerWidth > window.innerHeight;

                    let rawSteer, rawPitch;
                    if (isLandscape) { rawSteer = -beta;
                        rawPitch = gamma; } else { rawSteer = gamma;
                        rawPitch = beta - 45; }

                    smoothSteer += (rawSteer - smoothSteer) * 0.3;
                    smoothPitch += (rawPitch - smoothPitch) * 0.3;

                    if (!this.calibrated && this.gameRunning) {
                        this.calibSteer = smoothSteer;
                        this.calibPitch = smoothPitch;
                        this.calibrated = true;
                    }

                    if (this.calibrated) {
                        let dSteer = smoothSteer - this.calibSteer;
                        let dPitch = smoothPitch - this.calibPitch;
                        if (this.invertSteer) dSteer = -dSteer;

                        const deadZone = 10;
                        const maxAngle = 45;
                        if (Math.abs(dSteer) < deadZone) {
                            this.steerInput = 0;
                        } else {
                            const sign = dSteer > 0 ? 1 : -1;
                            const mag = (Math.abs(dSteer) - deadZone) / (maxAngle - deadZone);
                            const speed = Math.min(mag, 1);
                            let v;
                            if (speed < 0.33) v = 0.4;
                            else if (speed < 0.66) v = 0.9;
                            else v = 1.6;
                            this.steerInput = sign * v * this.speedMultipliers[this.speedLevel];
                        }

                        if (Math.abs(dPitch) < 1.5) dPitch = 0;
                        const ps = this.invertPitch ? -1 : 1;
                        this.pitchInput = THREE.MathUtils.clamp((dPitch / 28) * ps, -0.7, 0.5);
                    }
                    this.gyroAvailable = true;

                    if (this.gameRunning) {
                        const dir = this.steerInput === 0 ? '⏸' : this.steerInput > 0 ? '↻' : '↺';
                        const spd = Math.abs(this.steerInput).toFixed(1);
                        this.steerIndicator.textContent = `${dir} ${spd}x`;
                        this.gyroDebug.textContent =
                            `${isLandscape?'LAND':'PORT'} | ptc:${this.pitchInput.toFixed(2)}`;
                    }
                });

                if (typeof DeviceOrientationEvent.requestPermission === 'function') this._iosGyro = true;
                this.setupTouchFallback();
            }

            setupTouchFallback() {
                let active = false;
                let sx = 0,
                    sy = 0;
                let fy = 0,
                    fp = 0;
                document.addEventListener('touchstart', (e) => {
                    if (!this.gameRunning) return;
                    if (e.target.closest('#game-over-screen') || e.target.closest('#splash-screen') || e.target
                        .closest('#bottom-bar')) return;
                    if (e.touches.length === 2) { active = true;
                        sx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        sy = (e.touches[0].clientY + e.touches[1].clientY) / 2; }
                });
                document.addEventListener('touchmove', (e) => {
                    if (!active || !this.gameRunning) return;
                    if (e.touches.length === 2) {
                        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        fy += (cx - sx) * 0.003;
                        fp += (cy - sy) * 0.004;
                        fp = THREE.MathUtils.clamp(fp, -0.7, 0.5);
                        sx = cx;
                        sy = cy;
                    }
                });
                document.addEventListener('touchend', () => { active = false; });
                this._fbYaw = () => fy;
                this._fbPitch = () => fp;
            }

            async requestGyroPermission() {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try { if ((await DeviceOrientationEvent.requestPermission()) === 'granted') this.gyroAvailable =
                            true; } catch (e) {}
                }
            }

            startGame() {
                this.splashScreen.style.display = 'none';
                this.audio.init();
                this.vibration.requestPermission();
                // Forzar vibración extra
                setTimeout(() => this.vibration.requestPermission(), 500);

                if (this._iosGyro && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    this.requestGyroPermission().then(() => this.beginGameplay());
                } else {
                    this.beginGameplay();
                }

                document.getElementById('permission-request').style.display = 'block';
                setTimeout(() => { document.getElementById('permission-request').style.display = 'none'; }, 3000);
                this.gyroDebug.style.display = 'block';
                this.bottomBar.style.display = 'flex';
                this.steerIndicator.style.display = 'block';
            }

            beginGameplay() {
                this.score = 0;
                this.health = 100;
                this.gameTime = 0;
                this.difficulty = 1;
                this.spawnTimer = 0;
                this.spawnInterval = 3.5;
                this.bullets = [];
                this.planes = [];
                this.explosions = [];
                this.hitEffects = [];
                this.deckFires = [];
                this.bulletMeshes.forEach(m => this.scene.remove(m));
                this.bulletMeshes = [];
                this.planeMeshes.forEach(p => this.scene.remove(p.group));
                this.planeMeshes = [];
                this.explosionParticles.forEach(ep => ep.particles.forEach(p => this.scene.remove(p)));
                this.explosionParticles = [];
                this.smokeParticles.forEach(sp => sp.particles.forEach(p => this.scene.remove(p)));
                this.smokeParticles = [];
                this.isFiring = false;
                this.fireCooldown = 0;
                this.muzzleFlash = 0;
                this.turretYaw = 0;
                this.turretPitch = 0;
                this.steerInput = 0;
                this.calibrated = false;
                this.gameRunning = true;
                this.gameOverScreen.style.display = 'none';
                this.updateHUD();
                this.showMessage('¡DEFIENDE EL BUQUE!', 2000);
                this.audio.playAlarm();
                this.lastTime = performance.now();
            }

            restartGame() { this.beginGameplay(); }
            gameOver() {
                this.gameRunning = false;
                this.isFiring = false;
                this.steerInput = 0;
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
                this.createExplosion(new THREE.Vector3(0, 2, 0), 2.5);
                this.createSmoke(new THREE.Vector3(0, 3, 0), 3.0);
                setTimeout(() => {
                    this.gameOverScreen.style.display = 'flex';
                    this.finalScoreEl.textContent = `Puntuación: ${this.score}`;
                    this.updateRanking();
                    this.gyroDebug.style.display = 'none';
                    this.bottomBar.style.display = 'none';
                    this.steerIndicator.style.display = 'none';
                }, 800);
            }
            updateRanking() {
                let r = JSON.parse(localStorage.getItem('midway_v10') || '[]');
                r.push({ score: this.score, time: Math.floor(this.gameTime), date: new Date().toLocaleDateString() });
                r.sort((a, b) => b.score - a.score);
                r = r.slice(0, 10);
                localStorage.setItem('midway_v10', JSON.stringify(r));
                let h = '<h3>🏆 MEJORES ARTILLEROS</h3>';
                r.forEach((x, i) => h +=
                    `<div>${i+1}. ${x.score} pts - ${x.time}s (${x.date})</div>`);
                this.rankingEl.innerHTML = h;
            }
            showMessage(t, d = 1500) {
                this.messageEl.textContent = t;
                this.messageEl.style.opacity = '1';
                clearTimeout(this._mt);
                this._mt = setTimeout(() => this.messageEl.style.opacity = '0', d);
            }
            updateHUD() {
                this.scoreEl.textContent = `PTS: ${this.score}`;
                this.healthBar.style.width = `${this.health}%`;
                this.healthBar.style.background = this.health < 30 ? 'linear-gradient(90deg, #ff0000, #ff6600)' :
                    this.health < 60 ? 'linear-gradient(90deg, #ff6600, #ffaa00)' :
                    'linear-gradient(90deg, #ff0000, #ff4444)';
            }

            spawnPlane() {
                const types = ['fighter', 'dive_bomber', 'torpedo_bomber'];
                const w = [0.5, 0.3, 0.2];
                const rand = Math.random();
                let type = types[0],
                    cum = 0;
                for (let i = 0; i < types.length; i++) { cum += w[i]; if (rand <= cum) { type = types[i]; break; } }
                const a = Math.random() * Math.PI * 2;
                const d = 30 + Math.random() * 40;
                const h = 3 + Math.random() * 25;
                const plane = {
                    type,
                    position: new THREE.Vector3(Math.cos(a) * d, h, Math.sin(a) * d),
                    velocity: new THREE.Vector3(),
                    speed: 7 + Math.random() * 7 + this.difficulty * 2.5,
                    health: type === 'fighter' ? 2 : 3,
                    attackCooldown: 0,
                    alive: true,
                    group: null,
                };
                const ts = new THREE.Vector3(0, 1.5, 0).sub(plane.position).normalize();
                plane.velocity.copy(ts.multiplyScalar(plane.speed));
                plane.group = new THREE.Group();
                plane.group.position.copy(plane.position);
                const f = new THREE.Mesh(new THREE.ConeGeometry(0.35, 2.2, 6), new THREE.MeshStandardMaterial({
                    color: type === 'fighter' ? 0x5a6a4a : type === 'dive_bomber' ? 0x6a4a3a : 0x4a5a3a,
                    roughness: 0.45,
                    metalness: 0.4
                }));
                f.rotation.x = Math.PI / 2;
                f.position.z = -0.9;
                f.castShadow = true;
                plane.group.add(f);
                const wg = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.08, 1), new THREE.MeshStandardMaterial({ color: 0x4a4a3a,
                    roughness: 0.55, metalness: 0.3 }));
                wg.position.z = -0.7;
                wg.castShadow = true;
                plane.group.add(wg);
                const t = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.25, 0.4), new THREE.MeshStandardMaterial({ color: 0x4a4a3a,
                    roughness: 0.55, metalness: 0.3 }));
                t.position.set(0, 0.15, 0.4);
                plane.group.add(t);
                plane.propeller = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.3, 0.08), new THREE.MeshStandardMaterial({ color: 0x999999,
                    roughness: 0.25, metalness: 0.8 }));
                plane.propeller.position.z = -2;
                plane.group.add(plane.propeller);
                const hm = new THREE.Mesh(new THREE.CircleGeometry(0.25, 16), new THREE.MeshBasicMaterial({ color: 0xff0000,
                    side: THREE.DoubleSide }));
                hm.position.set(0, 0, -0.4);
                hm.rotation.y = Math.PI;
                plane.group.add(hm);
                plane.group.lookAt(new THREE.Vector3().addVectors(plane.position, plane.velocity));
                this.scene.add(plane.group);
                this.planes.push(plane);
                this.planeMeshes.push(plane);
            }

            fireBullet() {
                if (this.fireCooldown > 0) return;
                const bs = 55;
                const dir = new THREE.Vector3(0, 0, -1);
                dir.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                for (let i = 0; i < 2; i++) {
                    const off = (i - 0.5) * 0.35;
                    const tip = new THREE.Vector3(off, 0, -4.0);
                    tip.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                    tip.add(this.gunsGroup.getWorldPosition(new THREE.Vector3()));
                    const sp = new THREE.Vector3((Math.random() - 0.5) * 0.04, (Math.random() - 0.5) * 0.04, (Math.random() -
                        0.5) * 0.04);
                    const fd = dir.clone().add(sp).normalize();
                    const bullet = { position: tip.clone(), velocity: fd.multiplyScalar(bs), life: 1.8, tracer: null };
                    const tg = new THREE.SphereGeometry(0.06, 4, 4);
                    bullet.tracer = new THREE.Mesh(tg, new THREE.MeshBasicMaterial({ color: 0xffff44 }));
                    bullet.tracer.position.copy(bullet.position);
                    this.scene.add(bullet.tracer);
                    this.bulletMeshes.push(bullet.tracer);
                    this.bullets.push(bullet);
                }
                this.fireCooldown = this.fireRate;
                this.muzzleFlash = 0.05;
                this.audio.playGunshot();
                this.vibration.gunshotVibrate();
            }

            createExplosion(pos, size = 1) {
                const parts = [];
                const fc = Math.floor(35 * size);
                for (let i = 0; i < fc; i++) {
                    const p = new THREE.Mesh(
                        new THREE.SphereGeometry(0.12 * size * (0.5 + Math.random()), 6, 6),
                        new THREE.MeshBasicMaterial({
                            color: new THREE.Color().setHSL(0.06 + Math.random() * 0.12, 1, 0.4 + Math.random() * 0.6),
                            transparent: true,
                            opacity: 1
                        })
                    );
                    p.position.copy(pos);
                    p.velocity = new THREE.Vector3((Math.random() - 0.5) * 15 * size, (Math.random() - 0.5) * 15 * size, (Math
                        .random() - 0.5) * 15 * size);
                    p.life = 0.4 + Math.random() * 0.8;
                    p.age = 0;
                    p.isFire = true;
                    this.scene.add(p);
                    parts.push(p);
                }
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.5 * size, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff,
                    transparent: true, opacity: 0.9 }));
                core.position.copy(pos);
                core.life = 0.2;
                core.age = 0;
                core.isCore = true;
                this.scene.add(core);
                parts.push(core);
                const light = new THREE.PointLight(0xff6600, 8 * size, 20 * size);
                light.position.copy(pos);
                light.life = 0.4;
                light.age = 0;
                light.isLight = true;
                this.scene.add(light);
                parts.push(light);
                this.explosionParticles.push({ particles: parts, age: 0, life: 1.2 });
                setTimeout(() => this.createSmoke(pos, size), 150);
                this.audio.playExplosion();
                this.vibration.explosionVibrate();
            }

            createSmoke(pos, size = 1) {
                const parts = [];
                const sc = Math.floor(20 * size);
                for (let i = 0; i < sc; i++) {
                    const p = new THREE.Mesh(
                        new THREE.SphereGeometry(0.2 * size * (0.5 + Math.random()), 8, 8),
                        new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.7 })
                    );
                    p.position.copy(pos);
                    p.position.x += (Math.random() - 0.5) * 2 * size;
                    p.position.z += (Math.random() - 0.5) * 2 * size;
                    p.velocity = new THREE.Vector3((Math.random() - 0.5) * 3 * size, 2 + Math.random() * 5 * size, (Math.random() -
                        0.5) * 3 * size);
                    p.life = 1 + Math.random() * 2;
                    p.age = 0;
                    p.isSmoke = true;
                    this.scene.add(p);
                    parts.push(p);
                }
                this.smokeParticles.push({ particles: parts, age: 0, life: 3 });
            }

            createDeckFire(pos) {
                const fg = new THREE.Group();
                fg.position.copy(pos);
                fg.position.y = 1.9;
                for (let i = 0; i < 8; i++) {
                    const fl = new THREE.Mesh(
                        new THREE.ConeGeometry(0.15 + Math.random() * 0.2, 0.5 + Math.random() * 0.8, 6),
                        new THREE.MeshBasicMaterial({
                            color: new THREE.Color().setHSL(0.06 + Math.random() * 0.1, 1, 0.4 + Math.random() * 0.5),
                            transparent: true,
                            opacity: 0.8
                        })
                    );
                    fl.position.set((Math.random() - 0.5) * 1.5, 0.3, (Math.random() - 0.5) * 1.5);
                    fl.userData = { speed: 0.5 + Math.random() * 1.5, offset: Math.random() * Math.PI * 2 };
                    fg.add(fl);
                }
                const fl = new THREE.PointLight(0xff4400, 2, 6);
                fl.position.y = 0.5;
                fg.add(fl);
                this.scene.add(fg);
                this.deckFires.push({ group: fg, life: 4 + Math.random() * 6, age: 0 });
            }

            damageShip(amount) {
                this.health -= amount;
                if (this.health <= 0) { this.health = 0;
                    this.updateHUD();
                    this.gameOver(); return; }
                const ip = new THREE.Vector3((Math.random() - 0.5) * 12, 2, (Math.random() - 0.5) * 25);
                this.createExplosion(ip, 1 + amount / 20);
                this.createSmoke(ip, 0.8);
                this.createDeckFire(ip);
                this.audio.playHit();
                this.vibration.hitVibrate();
                this.showMessage('¡IMPACTO! -' + amount, 1200);
                this.updateHUD();
                this.hitEffects.push({ timer: 0.5, intensity: amount / 20 });
            }

            update(delta) {
                if (!this.gameRunning) { this.updateOcean(delta);
                    this.updateExplosions(delta);
                    this.updateSmoke(delta);
                    this.updateDeckFires(delta); return; }
                this.gameTime += delta;
                this.fireCooldown = Math.max(0, this.fireCooldown - delta);
                this.muzzleFlash = Math.max(0, this.muzzleFlash - delta);
                this.difficulty = 1 + Math.floor(this.gameTime / 30);
                this.spawnInterval = Math.max(0.7, 3.5 - this.difficulty * 0.35);
                this.spawnTimer += delta;
                if (this.spawnTimer >= this.spawnInterval) { this.spawnTimer = 0;
                    this.spawnPlane(); if (this.difficulty >= 3 && Math.random() < 0.5) setTimeout(() => { if (this.gameRunning)
                            this.spawnPlane(); }, Math.random() * 800); }
                let steer = this.steerInput,
                    pitch = this.pitchInput;
                if (!this.gyroAvailable || !this.calibrated) { if (this._fbYaw) steer = this._fbYaw(); if (this._fbPitch)
                        pitch = this._fbPitch(); }
                if (steer !== 0) this.turretYaw += steer * delta * 2.5;
                this.targetPitch = pitch;
                this.turretPitch += (this.targetPitch - this.turretPitch) * Math.min(delta * 7, 1);
                this.turretPitch = THREE.MathUtils.clamp(this.turretPitch, -0.4, 0.5);
                this.turretGroup.rotation.y = this.turretYaw;
                this.gunsGroup.rotation.x = this.turretPitch;
                const co = new THREE.Vector3(0, 2.2, 1.5);
                co.applyQuaternion(this.turretGroup.quaternion);
                this.camera.position.copy(this.turretGroup.position.clone().add(co));
                const ld = new THREE.Vector3(0, 0.2, -20);
                ld.applyQuaternion(this.gunsGroup.getWorldQuaternion(new THREE.Quaternion()));
                this.camera.lookAt(this.gunsGroup.getWorldPosition(new THREE.Vector3()).add(ld));
                if (this.isFiring && this.fireCooldown <= 0) this.fireBullet();
                this.scene.fog = this.muzzleFlash > 0 ? new THREE.FogExp2(new THREE.Color().lerpColors(new THREE.Color(
                    0x8cc8e8), new THREE.Color(0xffcc66), this.muzzleFlash / 0.05), 0.00005 + (this.muzzleFlash / 0.05) *
                    0.0002) : new THREE.FogExp2(0x8cc8e8, 0.00005);
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.position.add(b.velocity.clone().multiplyScalar(delta));
                    b.life -= delta;
                    b.tracer.position.copy(b.position);
                    if (b.life <= 0 || b.position.y < -3 || Math.abs(b.position.x) > 80 || Math.abs(b.position.z) > 80) { this
                            .scene.remove(b.tracer); const idx = this.bulletMeshes.indexOf(b.tracer); if (idx > -1) this
                            .bulletMeshes.splice(idx, 1);
                        this.bullets.splice(i, 1); continue; }
                    for (let j = this.planes.length - 1; j >= 0; j--) {
                        const p = this.planes[j];
                        if (!p.alive) continue;
                        if (b.position.distanceTo(p.group.position) < 2.2) { p.health--; if (p.health <= 0) { this.destroyPlane(
                                    j);
                                this.score += 100;
                                this.showMessage('¡DERRIBADO! +100', 1200); } else { this.showMessage('¡IMPACTO!', 500);
                                this.audio.playHit(); } this.scene.remove(b.tracer); const idx = this.bulletMeshes.indexOf(
                                    b.tracer); if (idx > -1) this.bulletMeshes.splice(idx, 1);
                            this.bullets.splice(i, 1); break; }
                    }
                }
                for (let i = this.planes.length - 1; i >= 0; i--) {
                    const p = this.planes[i];
                    if (!p.alive) continue;
                    p.position.add(p.velocity.clone().multiplyScalar(delta));
                    p.group.position.copy(p.position);
                    p.group.lookAt(new THREE.Vector3().addVectors(p.position, p.velocity));
                    if (p.propeller) p.propeller.rotation.z += delta * 45;
                    p.attackCooldown = Math.max(0, p.attackCooldown - delta);
                    const dist = p.position.length();
                    if (dist < 28 && p.attackCooldown <= 0) {
                        if (p.type === 'fighter') { p.attackCooldown = 1.8;
                            this.damageShip(2 + Math.floor(this.difficulty / 2)); } else if (p.type === 'dive_bomber' && p
                            .position.y > 7 && dist < 18) { p.attackCooldown = 3.5;
                            p.velocity.y = -18;
                            setTimeout(() => { if (p.alive && this.gameRunning) { this.damageShip(12 + this.difficulty * 2);
                                    this.createExplosion(new THREE.Vector3((Math.random() - 0.5) * 12, 1.5, (Math.random() -
                                        0.5) * 22), 0.8); } }, 700); } else if (p.type === 'torpedo_bomber' && p.position.y <
                            2.5 && dist < 22) { p.attackCooldown = 5;
                            this.damageShip(18 + this.difficulty * 3);
                            this.createExplosion(new THREE.Vector3(0, -0.5, (Math.random() - 0.5) * 18), 1.2);
                            this.showMessage('¡TORPEDO! -' + (18 + this.difficulty * 3), 1500); }
                    }
                    if (Math.abs(p.position.x) > 70 || Math.abs(p.position.z) > 70 || p.position.y > 40 || p.position.y < -8)
                        this.removePlane(i);
                }
                if (Math.floor(this.gameTime) > Math.floor(this.gameTime - delta)) this.score += 10;
                this.updateExplosions(delta);
                this.updateSmoke(delta);
                this.updateDeckFires(delta);
                for (let i = this.hitEffects.length - 1; i >= 0; i--) { this.hitEffects[i].timer -= delta; if (this.hitEffects[
                        i].timer <= 0) this.hitEffects.splice(i, 1); }
                this.updateOcean(delta);
                this.updateHUD();
            }

            destroyPlane(i) {
                const p = this.planes[i];
                p.alive = false;
                this.createExplosion(p.group.position.clone(), 0.7);
                this.createSmoke(p.group.position.clone(), 0.8);
                this.scene.remove(p.group);
                const idx = this.planeMeshes.indexOf(p);
                if (idx > -1) this.planeMeshes.splice(idx, 1);
                this.planes.splice(i, 1);
            }
            removePlane(i) {
                const p = this.planes[i];
                p.alive = false;
                this.scene.remove(p.group);
                const idx = this.planeMeshes.indexOf(p);
                if (idx > -1) this.planeMeshes.splice(idx, 1);
                this.planes.splice(i, 1);
            }
            updateExplosions(delta) {
                for (let i = this.explosionParticles.length - 1; i >= 0; i--) {
                    const e = this.explosionParticles[i];
                    e.age += delta;
                    for (let j = e.particles.length - 1; j >= 0; j--) {
                        const p = e.particles[j];
                        if (p.isLight) { p.age += delta;
                            p.intensity = 8 * (1 - p.age / p.life); if (p.age >= p.life) { this.scene.remove(p);
                                e.particles.splice(j, 1); } } else if (p.isCore) { p.age += delta;
                            p.material.opacity = 1 - p.age / p.life;
                            p.scale.setScalar(1 + p.age * 5); if (p.age >= p.life) { this.scene.remove(p);
                                e.particles.splice(j, 1); } } else { p.age += delta;
                            p.position.add(p.velocity.clone().multiplyScalar(delta));
                            p.velocity.y += 1.5 * delta;
                            p.material.opacity = Math.max(0, 1 - p.age / p.life);
                            p.scale.setScalar(Math.max(0.05, 1 - p.age / p.life)); if (p.age >= p.life) { this.scene.remove(
                                    p);
                                e.particles.splice(j, 1); } }
                    }
                    if (e.particles.length === 0) this.explosionParticles.splice(i, 1);
                }
            }
            updateSmoke(delta) {
                for (let i = this.smokeParticles.length - 1; i >= 0; i--) {
                    const s = this.smokeParticles[i];
                    s.age += delta;
                    for (let j = s.particles.length - 1; j >= 0; j--) {
                        const p = s.particles[j];
                        p.age += delta;
                        p.position.add(p.velocity.clone().multiplyScalar(delta));
                        p.velocity.y += 0.5 * delta;
                        p.material.opacity = Math.max(0, 0.7 * (1 - p.age / p.life));
                        p.scale.setScalar(1 + p.age * 2);
                        if (p.age >= p.life) { this.scene.remove(p);
                            s.particles.splice(j, 1); }
                    }
                    if (s.particles.length === 0) this.smokeParticles.splice(i, 1);
                }
            }
            updateDeckFires(delta) {
                for (let i = this.deckFires.length - 1; i >= 0; i--) {
                    const d = this.deckFires[i];
                    d.age += delta;
                    d.group.children.forEach(c => {
                        if (c.isPointLight) c.intensity = 2 * (1 - d.age / d.life);
                        else if (c.userData && c.userData.speed) {
                            c.scale.y = 0.5 + Math.sin(d.age * c.userData.speed + c.userData.offset) * 0.5;
                            c.material.opacity = Math.max(0, 0.8 * (1 - d.age / d.life));
                        }
                    });
                    if (d.age >= d.life) { d.group.children.forEach(c => { if (c.isPointLight) this.scene.remove(c); });
                        this.scene.remove(d.group);
                        this.deckFires.splice(i, 1); }
                }
            }
            updateOcean(delta) {
                if (!this.ocean || !this.oceanVerts) return;
                const pos = this.ocean.geometry.attributes.position.array;
                const t = performance.now() * 0.001;
                for (let i = 0; i < pos.length; i += 3) {
                    pos[i + 2] = Math.sin(this.oceanVerts[i] * 0.2 + t) * Math.cos(this.oceanVerts[i + 1] * 0.2 + t * 0.7) *
                        0.6 + Math.sin(this.oceanVerts[i] * 0.1 + t * 1.2) * 0.3;
                }
                this.ocean.geometry.attributes.position.needsUpdate = true;
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                const now = performance.now();
                this.update(Math.min((now - this.lastTime) / 1000, 0.1));
                this.lastTime = now;
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new MidwayGame();
        game.init();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
            self.addEventListener('install',()=>self.skipWaiting());
            self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
            self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));
          `], { type: 'application/javascript' }))).catch(() => {});
        }
        console.log('⚓ Midway v10 - Selector velocidad + Botones redondos + Sonidos');
    </script>
</body>
</html>
